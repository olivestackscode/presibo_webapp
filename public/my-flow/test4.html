<!-- Floating Chat Icon & Popup -->
<style>
  /* Chat button */
  #chatBtn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    background: linear-gradient(to bottom right, #3b82f6, #06b6d4);
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    transition: transform 0.2s ease;
  }
  #chatBtn:hover {
    transform: scale(1.1);
  }

  /* Chat popup */
  #chatPopup {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 360px;
    height: 480px;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    display: none;
    z-index: 999;
    border: 2px solid #3b82f6;
  }
  #chatPopup iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

<!-- HTML -->
<div id="chatBtn">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9 9 4 9 9z" />
  </svg>
</div>

<div id="chatPopup">
  <iframe src="https://app.presibo.com/ai" title="Presibo AI Chat"></iframe>
</div>

<script>
  const chatBtn = document.getElementById('chatBtn');
  const chatPopup = document.getElementById('chatPopup');

  chatBtn.addEventListener('click', () => {
    chatPopup.style.display = chatPopup.style.display === 'block' ? 'none' : 'block';
  });
</script>
