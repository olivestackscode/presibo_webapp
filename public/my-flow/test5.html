<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presibo Flow AI — Choose Your Role</title>
  <meta name="description" content="Explore smarter healthcare workflows with Presibo Flow AI. Choose your role to begin — Medical or Non-Medical Professional.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #0a192f, #020617);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      position: relative;
    }
    .glow-text {
      text-shadow: 0 0 12px rgba(56,189,248,0.5), 0 0 24px rgba(56,189,248,0.4);
    }
    .glow-card {
      box-shadow: 0 0 25px rgba(59,130,246,0.3);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      min-width: 42%;
      min-height: 200px;
    }
    .glow-card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(59,130,246,0.7);
    }
    .bg-gradient-btn {
      background: linear-gradient(135deg, #60a5fa, #3b82f6, #2563eb);
    }
    .bg-gradient-btn-orange {
      background: linear-gradient(135deg, #fbbf24, #fb923c, #f97316);
    }
    .btn-create-flow {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 1rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 0 20px rgba(34,197,94,0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-create-flow:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(34,197,94,0.7);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .glow-card {
        width: 100%;
        min-width: unset;
        height: auto;
        padding: 2rem;
        margin-bottom: 1rem;
        font-size: 1.25rem;
      }
      h1 {
        font-size: 2.5rem;
      }
      .subtitle {
        font-size: 1.1rem;
      }
      .card-text {
        font-size: 1.25rem;
        line-height: 1.4;
      }
      .btn-create-flow {
        position: static;
        display: block;
        margin: 1.5rem auto 2rem auto;
      }
    }

    @media (max-width: 480px) {
      .glow-card {
        padding: 1.5rem;
        font-size: 1.1rem;
      }
      h1 {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .card-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-center px-4 py-8">

  <div class="mb-8 sm:mb-16 w-full max-w-2xl">
    <h1 class="text-4xl sm:text-6xl font-extrabold glow-text mb-4">Presibo AI</h1>
    <p class="text-lg sm:text-xl text-gray-300 max-w-2xl mx-auto subtitle">Smarter Healthcare Workflows for Everyone</p>
    
    <!-- Create Flow+ Button -->
    <a href="my-flow" class="btn-create-flow">Create Flow+</a>
  </div>

  <div class="flex flex-col sm:flex-row justify-center items-center gap-4 sm:gap-6 w-full max-w-md sm:max-w-none">
    <!-- Medical Professional -->
    <a href="https://flow.presibo.com/ai"
       class="glow-card flex flex-col justify-center items-center rounded-3xl bg-gradient-btn text-white font-bold card-text hover:shadow-2xl transition-all">
      <br>Medical<br>Professional
    </a>
    <!-- Non-Medical Professional -->
    <a href="https://presibo.com/ai"
       class="glow-card flex flex-col justify-center items-center rounded-3xl bg-gradient-btn-orange text-white font-bold card-text hover:shadow-2xl transition-all">
      <br>Non-Medical<br>Professional
    </a>
  </div>

  <footer class="absolute bottom-4 sm:bottom-6 text-gray-500 text-xs sm:text-sm">
    © 2025 Powered by Presibo Health
  </footer>
</body>
</html>
