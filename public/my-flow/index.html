<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presibo Flow AI — Health Flow Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #0a192f, #020617);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .glow-text {
      text-shadow: 0 0 12px rgba(56,189,248,0.5), 0 0 24px rgba(56,189,248,0.4);
    }
    .glow-card {
      box-shadow: 0 0 25px rgba(59,130,246,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glow-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(59,130,246,0.7);
    }
    .drop-zone {
      min-height: 300px;
      border: 2px dashed rgba(56,189,248,0.4);
      border-radius: 1rem;
      padding: 1rem;
      transition: background 0.3s ease;
    }
    .drop-zone.dragover {
      background: rgba(56,189,248,0.1);
      border-color: rgba(56,189,248,0.8);
    }
    .draggable {
      cursor: grab;
    }
    .frequency-select {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      border-radius: 0.5rem;
      padding: 0.3rem 0.6rem;
    }
  </style>
</head>
<body class="flex flex-col items-center text-center px-4 py-8">
  <div class="mb-8">
    <h1 class="text-4xl sm:text-5xl font-extrabold glow-text mb-3">Presibo Flow AI</h1>
    <p class="text-gray-300 max-w-2xl text-lg">Create your personalized health flow by dragging items into your workflow panel.</p>
  </div>

  <!-- Available Flow Items -->
  <div class="flex flex-wrap justify-center gap-4 mb-10">
    <div class="glow-card bg-gradient-to-br from-blue-500 to-blue-700 p-4 rounded-xl draggable" draggable="true" data-item="Doctor Visit">
      Doctor Visit
    </div>
    <div class="glow-card bg-gradient-to-br from-green-500 to-green-700 p-4 rounded-xl draggable" draggable="true" data-item="Vitals Monitoring">
      Vitals Monitoring
    </div>
    <div class="glow-card bg-gradient-to-br from-pink-500 to-pink-700 p-4 rounded-xl draggable" draggable="true" data-item="Medication Tracking">
      Medication Tracking
    </div>
    <div class="glow-card bg-gradient-to-br from-purple-500 to-purple-700 p-4 rounded-xl draggable" draggable="true" data-item="Appointment Reminder">
      Appointment Reminder
    </div>
  </div>

  <!-- User Flow Panel -->
  <div id="flowPanel" class="drop-zone w-full max-w-3xl mb-8">
    <p class="text-gray-400 italic">Drag and drop items here to build your health workflow...</p>
  </div>

  <button id="saveFlow" class="mt-4 px-6 py-3 rounded-xl bg-gradient-to-br from-blue-600 to-blue-400 font-bold glow-card">
    Save My Health Flow
  </button>

  <footer class="mt-12 text-gray-500 text-xs">© 2025 Powered by Presibo Health</footer>

  <script>
    const draggables = document.querySelectorAll('.draggable');
    const dropZone = document.getElementById('flowPanel');

    draggables.forEach(item => {
      item.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', item.getAttribute('data-item'));
      });
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');

      const itemName = e.dataTransfer.getData('text/plain');
      const itemEl = document.createElement('div');
      itemEl.className = 'bg-gray-800 text-white p-3 rounded-lg mb-3 flex justify-between items-center glow-card';
      itemEl.innerHTML = `
        <span>${itemName}</span>
        <select class="frequency-select ml-2">
          <option value="">Frequency</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      `;
      dropZone.appendChild(itemEl);
    });

    document.getElementById('saveFlow').addEventListener('click', () => {
      const flowItems = Array.from(dropZone.querySelectorAll('.bg-gray-800 span')).map(el => el.textContent);
      alert('Flow Saved: ' + flowItems.join(', '));
    });
  </script>
</body>
</html>
