<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presibo Board with Chat & Login Popups</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }

    .popup-bg {
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 0.75rem;
    }

    .popup {
      display: none;
      transition: all 0.3s ease;
      opacity: 0;
    }

    .popup.active {
      display: flex;
      opacity: 1;
    }
  </style>
</head>
<body class="relative min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-blue-600 text-white py-3 px-4 flex justify-between items-center shadow-md">
    <h1 class="text-lg font-semibold">Presibo Board</h1>
    <div>
      <button id="loginBtn" class="bg-white text-blue-600 px-3 py-1 rounded-lg font-medium">Login</button>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="flex flex-1 flex-col md:flex-row">
    <!-- Left Sidebar -->
    <section class="w-full md:w-1/4 bg-gray-100 p-4 overflow-y-auto">
      <h2 class="font-semibold text-lg mb-3">Available Flow Items</h2>
      <div class="flex flex-col space-y-3">
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Book Home Visit</div>
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Ask AI</div>
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Food Plan</div>
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Doctor Chat</div>
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Prescriptions</div>
        <div draggable="true" class="bg-white p-3 rounded-lg shadow cursor-pointer hover:bg-blue-50">Lab Tests</div>
      </div>
    </section>

    <!-- Flow Panel -->
    <section id="dropZone" class="flex-1 bg-white p-4 min-h-[400px] grid md:grid-cols-3 sm:grid-cols-2 gap-4 border-t md:border-t-0 md:border-l border-gray-200">
      <p class="text-gray-400 col-span-full text-center" id="placeholder">Drag and drop items here</p>
    </section>
  </main>

  <!-- Floating Chat Icon -->
  <button id="chatBtn" class="fixed bottom-5 right-5 bg-blue-600 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg hover:bg-blue-700">
    💬
  </button>

  <!-- Chat Popup -->
  <div id="chatPopup" class="popup fixed inset-0 popup-bg items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-lg relative p-2 md:p-4">
      <button id="closeChat" class="absolute top-3 right-3 bg-gray-200 text-gray-700 rounded-full px-3 py-1 text-sm hover:bg-gray-300">✕</button>
      <iframe src="https://app.presibo.com/ai" title="Presibo AI Chat"></iframe>
    </div>
  </div>

  <!-- Login Popup -->
  <div id="loginPopup" class="popup fixed inset-0 popup-bg items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg relative p-2 md:p-4">
      <button id="closeLogin" class="absolute top-3 right-3 bg-gray-200 text-gray-700 rounded-full px-3 py-1 text-sm hover:bg-gray-300">✕</button>
      <iframe src="/login" title="Login"></iframe>
    </div>
  </div>

  <script>
    // Drag and Drop
    const items = document.querySelectorAll('[draggable="true"]');
    const dropZone = document.getElementById('dropZone');
    const placeholder = document.getElementById('placeholder');

    items.forEach(item => {
      item.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', item.innerText);
      });
    });

    dropZone.addEventListener('dragover', e => e.preventDefault());
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      const text = e.dataTransfer.getData('text/plain');
      const newItem = document.createElement('div');
      newItem.className = 'bg-blue-50 p-3 rounded-lg shadow text-center';
      newItem.innerText = text;
      dropZone.appendChild(newItem);
      placeholder.style.display = 'none';
    });

    // Chat Popup
    const chatBtn = document.getElementById('chatBtn');
    const chatPopup = document.getElementById('chatPopup');
    const closeChat = document.getElementById('closeChat');

    chatBtn.onclick = () => chatPopup.classList.add('active');
    closeChat.onclick = () => chatPopup.classList.remove('active');

    // Login Popup
    const loginBtn = document.getElementById('loginBtn');
    const loginPopup = document.getElementById('loginPopup');
    const closeLogin = document.getElementById('closeLogin');

    loginBtn.onclick = () => loginPopup.classList.add('active');
    closeLogin.onclick = () => loginPopup.classList.remove('active');
  </script>
</body>
</html>
