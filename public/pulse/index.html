    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    // Mock Pulse Posts Data (simulate API response)
    const pulsePosts = [
      {
        id: 100,
        type: 'video',
        url: 'https://example.com/video1.mp4',
        thumbnail: 'https://via.placeholder.com/400x700?text=Workout+1',
        title: 'Full Body HIIT Workout',
        description: '20-minute high-intensity workout to burn fat and build strength. No equipment needed!',
        hashtags: ['#HIIT', '#FullBody', '#HomeWorkout', '#Fitness'],
        time: '2 hours ago',
        likes: 1245,
        comments: 89,
        shares: 234,
        trainer: { name: 'Aisha Fitness', username: '@aishafit', avatar: 'https://via.placeholder.com/50?text=A' }
      },
      {
        id: 99,
        type: 'image',
        url: 'https://via.placeholder.com/400x700?text=Stretch+Session',
        thumbnail: 'https://via.placeholder.com/400x700?text=Stretch+Session',
        title: 'Daily Stretch Routine',
        description: 'Improve flexibility with this 10-minute morning stretch. Perfect for beginners.',
        hashtags: ['#Yoga', '#Stretch', '#MorningRoutine', '#Wellness'],
        time: '5 hours ago',
        likes: 856,
        comments: 45,
        shares: 112,
        trainer: { name: 'Yoga Guru', username: '@yogaguru', avatar: 'https://via.placeholder.com/50?text=Y' }
      },
      {
        id: 98,
        type: 'video',
        url: 'https://example.com/video2.mp4',
        thumbnail: 'https://via.placeholder.com/400x700?text=Cardio+Blast',
        title: 'Cardio Blast Challenge',
        description: 'Jump rope and burpees for maximum calorie burn. Join the 30-day challenge!',
        hashtags: ['#Cardio', '#Challenge', '#JumpRope', '#FitnessMotivation'],
        time: '1 day ago',
        likes: 2034,
        comments: 156,
        shares: 345,
        trainer: { name: 'Cardio King', username: '@cardioking', avatar: 'https://via.placeholder.com/50?text=C' }
      },
      // Add more posts to simulate total of 100
      ...Array.from({ length: 97 }, (_, i) => ({
        id: i + 1,
        type: Math.random() > 0.5 ? 'video' : 'image',
        url: `https://via.placeholder.com/400x700?text=Workout+${i + 1}`,
        thumbnail: `https://via.placeholder.com/400x700?text=Workout+${i + 1}`,
        title: `Workout Session ${i + 1}`,
        description: `Description for workout ${i + 1}. Great for health and fitness.`,
        hashtags: ['#Fitness', '#Workout', '#Health'],
        time: `${Math.floor(Math.random() * 24)} hours ago`,
        likes: Math.floor(Math.random() * 2000) + 100,
        comments: Math.floor(Math.random() * 200) + 10,
        shares: Math.floor(Math.random() * 500) + 50,
        trainer: { name: `Trainer ${i + 1}`, username: `@trainer${i + 1}`, avatar: `https://via.placeholder.com/50?text=T${i + 1}` }
      }))
    ];

    let uiState = {
      posts: [],
      isLoading: true,
      error: null,
      currentIndex: 0,
      likedPosts: new Set()
    };

    let originalPosts = [];
    let arrangedPosts = [];
    let endlessPosts = [];

    // DOM Elements
    const loadingDiv = document.getElementById('loading');
    const swiperWrapper = document.getElementById('pulse-slides');
    const prevPostBtn = document.getElementById('prev-post');
    const nextPostBtn = document.getElementById('next-post');
    const likeBtn = document.querySelector('.like-btn');

    // Header elements
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const notificationBtn = document.getElementById('notification-btn');
    const notificationDropdown = document.getElementById('notification-dropdown');
    const profileBtn = document.getElementById('profile-btn');
    const profileDropdown = document.getElementById('profile-dropdown');

    // Load Posts (simulate API)
    async function loadPulsePosts() {
      // Simulate API delay
      await new Promise(resolve => setTimeout(resolve, 1500));
      
      originalPosts = pulsePosts.sort((a, b) => b.id - a.id); // Newest first
      arrangedPosts = rearrangePosts(originalPosts);
      endlessPosts = createEndlessScroll(arrangedPosts);
      
      uiState = {
        ...uiState,
        posts: endlessPosts,
        isLoading: false,
        error: null
      };
      
      renderSlides();
      initSwiper();
      updateCurrentPost();
    }

    // Rearrange Posts Algorithm
    function rearrangePosts(originalPosts) {
      if (originalPosts.length === 0) return [];
      
      const total = originalPosts.length;
      const arranged = [];
      const used = new Set();
      
      // Sort by ID descending (newest first)
      const sortedPosts = [...originalPosts].sort((a, b) => b.id - a.id);
      
      function addSequential(start, count, descending = true) {
        for (let i = 0; i < count; i++) {
          if (arranged.length >= total) break;
          
          let index = descending ? start + i : start - i;
          if (index >= 0 && index < total && !used.has(index)) {
            arranged.push(sortedPosts[index]);
            used.add(index);
          }
        }
      }
      
      // Pattern from code
      addSequential(0, 3); // Newest 3
      const middlePoint = Math.floor(total / 2);
      addSequential(middlePoint, 3); // Middle 3
      addSequential(3, 3); // Next newest 3
      addSequential(middlePoint + 3, 8); // Middle 8
      addSequential(6, Math.min(35, total - 6)); // Remaining newest up to 35
      addSequential(middlePoint + 11, total - (middlePoint + 11)); // Remaining middle
      
      // Fill gaps in middle range
      for (let i = Math.max(0, middlePoint - 10); i < middlePoint; i++) {
        if (arranged.length >= total) break;
        if (!used.has(i)) {
          arranged.push(sortedPosts[i]);
          used.add(i);
        }
      }
      
      // Final fill
      for (let i = 0; i < total; i++) {
        if (arranged.length >= total) break;
        if (!used.has(i)) {
          arranged.push(sortedPosts[i]);
          used.add(i);
        }
      }
      
      return arranged;
    }

    // Create Endless Scroll
    function createEndlessScroll(arrangedPosts) {
      if (arrangedPosts.length === 0) return [];
      return Array.from({ length: arrangedPosts.length * 10 }, (_, i) => arrangedPosts[i % arrangedPosts.length]);
    }

    // Render Slides
    function renderSlides() {
      swiperWrapper.innerHTML = '';
      uiState.posts.forEach((post, index) => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide pulse-slide';
        slide.innerHTML = `
          <div class="pulse-media" style="background-image: url('${post.thumbnail}');">
            ${post.type === 'video' ? `<video class="pulse-video" src="${post.url}" muted loop playsinline></video>` : ''}
          </div>
          <div class="pulse-overlay">
            <div class="text-white">
              <h3 class="text-xl font-bold mb-2">${post.title}</h3>
              <p class="text-sm mb-3 opacity-90">${post.description}</p>
              <div class="flex flex-wrap gap-1 mb-3">
                ${post.hashtags.map(tag => `<span class="bg-naija-green text-white px-2 py-1 rounded-full text-xs">#${tag}</span>`).join('')}
              </div>
              <div class="flex items-center justify-between text-sm">
                <div class="flex items-center gap-4">
                  <span>${post.time}</span>
                  <span class="flex items-center gap-1">
                    <i class="fas fa-heart ${uiState.likedPosts.has(post.id) ? 'text-red-500' : 'text-white'}"></i>
                    ${formatNumber(post.likes)}
                  </span>
                  <span class="flex items-center gap-1">
                    <i class="fas fa-comment text-white"></i>
                    ${formatNumber(post.comments)}
                  </span>
                  <span class="flex items-center gap-1">
                    <i class="fas fa-share text-white"></i>
                    ${formatNumber(post.shares)}
                  </span>
                </div>
              </div>
              <div class="flex items-center gap-3 mt-3">
                <img src="${post.trainer.avatar}" alt="${post.trainer.name}" class="w-8 h-8 rounded-full">
                <div>
                  <div class="font-semibold">${post.trainer.name}</div>
                  <div class="text-xs opacity-75">@${post.trainer.username}</div>
                </div>
              </div>
            </div>
          </div>
          <button class="like-btn ${uiState.likedPosts.has(post.id) ? 'liked' : ''}" onclick="toggleLike(${post.id})">
            <i class="fas fa-heart text-xl"></i>
          </button>
        `;
        swiperWrapper.appendChild(slide);
      });
    }

    // Update Current Post
    function updateCurrentPost() {
      const swiper = document.querySelector('.swiper-container').swiper;
      if (swiper) {
        swiper.slideTo(uiState.currentIndex, 0);
      }
      // Update like button for current post
      const currentPost = getCurrentPost();
      if (currentPost && likeBtn) {
        likeBtn.classList.toggle('liked', uiState.likedPosts.has(currentPost.id));
      }
    }

    // Format Number
    function formatNumber(num) {
      if (num >= 1000000) return `${(num / 1000000).toFixed(1)}M`;
      if (num >= 1000) return `${(num / 1000).toFixed(1)}K`;
      return num.toString();
    }

    // Toggle Like
    function toggleLike(postId) {
      const currentLiked = new Set(uiState.likedPosts);
      if (currentLiked.has(postId)) {
        currentLiked.delete(postId);
      } else {
        currentLiked.add(postId);
      }
      uiState.likedPosts = currentLiked;
      // Re-render slides to update hearts
      renderSlides();
      updateCurrentPost();
    }

    // Get Current Post
    function getCurrentPost() {
      return uiState.posts[uiState.currentIndex] || null;
    }

    // Next/Previous Post
    function nextPost() {
      uiState.currentIndex = (uiState.currentIndex + 1) % uiState.posts.length;
      updateCurrentPost();
    }

    function previousPost() {
      uiState.currentIndex = uiState.currentIndex > 0 ? uiState.currentIndex - 1 : uiState.posts.length - 1;
      updateCurrentPost();
    }

    // Init Swiper
    function initSwiper() {
      const swiper = new Swiper('#pulse-swiper', {
        direction: 'vertical',
        slidesPerView: 1,
        spaceBetween: 0,
        mousewheel: true,
        loop: true,
        on: {
          slideChange: function () {
            uiState.currentIndex = this.realIndex;
            const currentPost = getCurrentPost();
            if (currentPost && currentPost.type === 'video') {
              const video = this.slides[this.realIndex].querySelector('.pulse-video');
              if (video) {
                video.play();
              }
            }
          }
        }
      });

      // Touch controls
      let startY = 0;
      let startTime = 0;
      swiper.el.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        startTime = Date.now();
      });
      swiper.el.addEventListener('touchend', (e) => {
        const endY = e.changedTouches[0].clientY;
        const deltaY = startY - endY;
        const deltaTime = Date.now() - startTime;

        if (deltaTime < 300 && Math.abs(deltaY) > 50) {
          if (deltaY > 0) nextPost();
          else previousPost();
        }
      });
    }

    // Header interactions
    function toggleMobileMenu() {
      mobileMenu.classList.toggle('hidden');
    }

    function toggleNotificationDropdown() {
      notificationDropdown.classList.toggle('active');
    }

    function toggleProfileDropdown() {
      profileDropdown.classList.toggle('hidden');
    }

    mobileMenuBtn.addEventListener('click', toggleMobileMenu);
    notificationBtn.addEventListener('click', toggleNotificationDropdown);
    profileBtn.addEventListener('click', toggleProfileDropdown);

    document.addEventListener('click', (e) => {
      if (!notificationBtn.contains(e.target)) notificationDropdown.classList.remove('active');
      if (!profileBtn.contains(e.target)) profileDropdown.classList.add('hidden');
    });

    prevPostBtn.addEventListener('click', previousPost);
    nextPostBtn.addEventListener('click', nextPost);

    // Initialize
    function init() {
      loadingDiv.classList.remove('hidden');
      loadPulsePosts().then(() => {
        loadingDiv.classList.add('hidden');
      });
    }

    init();
  </script>
</body>
</html>
