<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Feed – Presibo</title>
  <meta name="description" content="Explore Pulse workouts, fitness inspiration, and trainer-led sessions on Presibo." />
  <meta property="og:title" content="Pulse Feed – Presibo" />
  <meta property="og:description" content="Stay healthy with Pulse workouts. Swipe through fitness videos and connect with trainers." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://presibo.com/cover.jpg" />
  <meta property="og:url" content="https://presibo.com/pulse" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Tailwind + Bootstrap -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

  <style>
    body { font-family: "Inter", sans-serif; background: #fff; }
    .pulse-card { max-width: 420px; margin: 0 auto; }
    .loading-screen { display:flex; align-items:center; justify-content:center; height:100vh; }
    .dropdown-menu.show { display:block; }
    .swiper { height:100vh; }
    .pulse-video { width:100%; height:auto; border-radius:12px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="sticky-top bg-white shadow-sm border-b">
    <div class="container-fluid d-flex justify-content-between align-items-center py-2">
      <div class="flex items-center">
        <img src="/assets/img/new_presibo_logo.png" alt="Presibo Logo" class="h-8 w-auto me-2">
        <span class="fw-bold text-lg">Oresibo Pulse</span>
      </div>
      <div class="flex items-center space-x-3">
        <!-- Notifications -->
        <button id="notificationBtn" class="btn btn-link text-dark">
          <i class="bi bi-bell"></i>
        </button>
        <div id="notificationDropdown" class="dropdown-menu dropdown-menu-end p-2">
          <span class="dropdown-item-text">No new notifications</span>
        </div>
        <!-- Profile -->
        <div class="dropdown">
          <button class="btn btn-link dropdown-toggle" data-bs-toggle="dropdown">
            <img src="https://via.placeholder.com/30" class="rounded-circle" alt="Profile">
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><a class="dropdown-item" href="#">Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <!-- Loading -->
  <div id="loadingScreen" class="loading-screen">
    <div class="text-center">
      <div class="spinner-border text-primary mb-3"></div>
      <p>Loading Pulse feed...</p>
    </div>
  </div>

  <!-- Feed -->
  <div id="pulseFeed" class="hidden">
    <div class="swiper">
      <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>
  </div>

  <!-- Swiper + Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let endlessPosts = [];
    let uiState = { liked: new Set() };
    let swiper;

    // Rearrange posts (shuffle groups of 3)
    function rearrangePosts(posts) {
      const arr = [...posts];
      const groups = [];
      for (let i = 0; i < arr.length; i += 3) {
        groups.push(arr.slice(i, i + 3));
      }
      for (let i = groups.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [groups[i], groups[j]] = [groups[j], groups[i]];
      }
      return groups.flat();
    }

    function createEndlessScroll(posts) {
      return Array(10).fill().flatMap(() => rearrangePosts(posts));
    }

    function renderSlides() {
      const wrapper = document.getElementById("swiperWrapper");
      wrapper.innerHTML = "";
      endlessPosts.forEach(post => {
        const slide = document.createElement("div");
        slide.className = "swiper-slide flex items-center justify-center";

        const liked = uiState.liked.has(post.id);

        slide.innerHTML = `
          <div class="pulse-card p-4">
            <div class="flex items-center mb-3">
              <img src="${post.avatar}" alt="${post.trainer}" class="rounded-circle w-10 h-10 me-2">
              <strong>${post.trainer}</strong>
            </div>
            <video class="pulse-video" src="${post.videoUrl}" loop muted playsinline></video>
            <p class="mt-2">${post.content}</p>
            <div class="flex space-x-3 mt-2">
              <button class="like-btn text-sm" onclick="toggleLike(${post.id})">
                ${liked ? "❤️" : "🤍"} ${post.likes + (liked ? 1 : 0)}
              </button>
            </div>
            <div class="mt-1 text-muted">
              ${(post.hashtags || []).join(" ")}
            </div>
          </div>
        `;
        wrapper.appendChild(slide);
      });
    }

    function toggleLike(postId) {
      if (uiState.liked.has(postId)) {
        uiState.liked.delete(postId);
      } else {
        uiState.liked.add(postId);
      }
      renderSlides();
      swiper.update();
    }

    function handleVideoPlayback(swiper) {
      document.querySelectorAll('.pulse-video').forEach(v => v.pause());
      const active = swiper.slides[swiper.activeIndex];
      const vid = active?.querySelector(".pulse-video");
      if (vid) vid.play();
    }

    async function loadFeed() {
      try {
        const res = await fetch("https://presibo-wl.vercel.app/pulse.json");
        const posts = await res.json();

        endlessPosts = createEndlessScroll(posts);
        renderSlides();

        document.getElementById("loadingScreen").classList.add("hidden");
        document.getElementById("pulseFeed").classList.remove("hidden");

        swiper = new Swiper(".swiper", {
          direction: "vertical",
          loop: true,
          on: { slideChange: () => handleVideoPlayback(swiper) }
        });

        handleVideoPlayback(swiper);
      } catch (err) {
        console.error("Failed to load feed:", err);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadFeed();

      document.getElementById("notificationBtn").addEventListener("click", () => {
        document.getElementById("notificationDropdown").classList.toggle("show");
      });
    });
  </script>
</body>
</html>
