<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Basic Meta -->
<title>Presibo Pulse – Quick Health Reels by Experts | Presibo</title>
<meta name="description" content="Explore Presibo Pulse – an endless scroll of short health videos by Nigerian doctors, fitness trainers, and nutritionists. Your daily dose of wellness in 60 seconds.">
<meta name="keywords" content="Presibo Pulse, health reels, Nigerian doctors, fitness tips, nutrition videos, wellness short videos, healthcare Nigeria, medical reels, fitness Nigeria, health tech Africa">
<meta name="author" content="Presibo">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="Presibo Pulse – Quick health reels in 60 Seconds">
<meta property="og:description" content="Bite-sized videos by real experts: from workouts to doctor tips. Discover Nigeria’s first health & wellness short video stream.">
<meta property="og:image" content="https://presibo.com/assets/pulse-thumbnail.jpg">
<meta property="og:url" content="https://presibo.com/pulse">
<meta property="og:site_name" content="Presibo">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Presibo Pulse – Quick Health Reels by Experts">
<meta name="twitter:description" content="An endless feed of expert health videos. 60 seconds to a better you – from trusted Nigerian doctors, nutritionists & trainers.">
<meta name="twitter:image" content="https://presibo.com/assets/pulse-thumbnail.jpg">
<meta name="twitter:creator" content="@PresiboLife">

<!-- Mobile/App Specific -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3366cc"> <!-- Cornflower blue -->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #000;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .timeline-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .timeline-container::-webkit-scrollbar {
            display: none;
        }

        .post {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            background: #000;
        }

        .post-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                transparent 0%, 
                transparent 60%, 
                rgba(0,0,0,0.3) 80%, 
                rgba(0,0,0,0.7) 100%
            );
            pointer-events: none;
        }

        .post-content {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 80px;
            color: white;
            z-index: 10;
        }

        .trainer-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .trainer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            margin-right: 12px;
            object-fit: cover;
        }

        .trainer-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .trainer-details p {
            font-size: 12px;
            opacity: 0.8;
        }

        .post-description {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .post-hashtags {
            font-size: 14px;
            opacity: 0.9;
        }

        .post-hashtags span {
            color: #25d366;
            margin-right: 8px;
        }

        .post-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 5px;
            backdrop-filter: blur(10px);
        }

        .action-count {
            font-size: 12px;
            font-weight: 600;
        }

        .liked .action-icon {
            background: rgba(255,75,75,0.8);
            color: white;
        }

        .mute-btn .action-icon {
            width: 36px;
            height: 36px;
            font-size: 14px;
            background: rgba(255,255,255,0.12);
            margin-bottom: 3px;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(rgba(0,0,0,0.5), transparent);
        }

        .nav-back {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .nav-title {
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .nav-menu {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .play-pause-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(128,128,128,0.4);
            border: none;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 20;
            pointer-events: none;
        }

        .play-pause-btn.show {
            opacity: 1;
        }

        .progress-indicator {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: white;
            width: 12px;
            height: 12px;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .post-content {
                bottom: 60px;
                right: 70px;
            }

            .post-actions {
                bottom: 80px;
                right: 10px;
                gap: 20px;
            }

            .action-icon {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
        }

        /* Smooth transitions for media loading */
        .post-media {
            transition: opacity 0.3s ease;
        }

        .post-media.loading {
            opacity: 0.7;
        }
        
        a {
        	color: white;
        	text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-nav">
        <button class="nav-back" onclick="goBack()">←</button>
        <div class="nav-title">Presibo</div>
        <button class="nav-menu" onclick="showMenu()">⋮</button>
    </div>

    <!-- Progress Indicator -->
    <div class="progress-indicator" id="progressIndicator">
        <!-- Progress dots will be added by JavaScript -->
    </div>

    <!-- Timeline Container -->
    <div class="timeline-container" id="timelineContainer">
        <!-- Posts will be populated by JavaScript -->
    </div>

    <script>
        let timelinePosts = [];
        let currentPostIndex = 0;
        let likedPosts = new Set();
        let isMutedGlobal = true;
        let playBtnTimeout = null;

        async function fetchFeed() {
            try {
                const res = await fetch("https://presibo-wl.vercel.app/pulse.json");
                const data = await res.json();
                timelinePosts = data.posts || [];
                
                // Sanitization of URLs and missing fields
                timelinePosts.forEach(post => {
                    if (post.url && post.url.includes("presibo-wl.vercel.app//")) {
                        post.url = post.url.replace("presibo-wl.vercel.app//", "presibo-wl.vercel.app/");
                    }
                    if (post.trainer) {
                        if (!post.trainer.avatar || post.trainer.avatar.length < 30) {
                            post.trainer.avatar = `https://presibo-wl.vercel.app/photos/${post.trainer.id || 100}/avatar.jpg`;
                        }
                        if (post.trainer.name) {
                            post.trainer.name = post.trainer.name.trim();
                        }
                    }
                });

                createTimeline();
                
                // Auto-play first video if it exists
                setTimeout(() => {
                    const firstPost = document.querySelector('.post');
                    const firstVideo = firstPost?.querySelector('video');
                    if (firstVideo) {
                        firstVideo.muted = isMutedGlobal;
                        firstVideo.play().catch(() => {
                            // Auto-play blocked
                        });
                        const playBtn = firstPost.querySelector('.play-pause-btn');
                        if (playBtn) playBtn.classList.remove('show');
                    }
                }, 500);
            } catch (err) {
                console.error("Failed to load pulse feed", err);
            }
        }

        function createTimeline() {
            const container = document.getElementById('timelineContainer');
            const progressIndicator = document.getElementById('progressIndicator');
            
            container.innerHTML = '';
            progressIndicator.innerHTML = '';

            timelinePosts.forEach((post, index) => {
                // Create post element
                const postElement = document.createElement('div');
                postElement.className = 'post';
                postElement.setAttribute('data-index', index);

                // Create media element
                let mediaElement;
                if (post.type === 'video') {
                    mediaElement = document.createElement('video');
                    mediaElement.src = post.url;
                    mediaElement.loop = true;
                    mediaElement.muted = isMutedGlobal;
                    mediaElement.autoplay = false;
                    mediaElement.playsInline = true;
                    mediaElement.addEventListener('click', () => togglePlayPause(index));
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.src = post.url;
                    mediaElement.alt = post.title;
                }
                
                mediaElement.className = 'post-media loading';
                mediaElement.onload = () => mediaElement.classList.remove('loading');

                // Create post HTML
                postElement.innerHTML = `
                    <div class="loading-spinner"></div>
                    <div class="post-overlay"></div>
                    <div class="post-time">${post.time}</div>
                    
                    <div class="post-content">
                        <div class="trainer-info">
                            <a href="https://app.presibo.com/trainers/profile?id=${post.trainer.id}"><img src="${post.trainer.avatar}" alt="${post.trainer.name}" class="trainer-avatar"></a>
                            <div class="trainer-details">
                                <a href="https://app.presibo.com/trainers/profile?id=${post.trainer.id}"><h3>${post.trainer.name}</h3></a>
                               <a href="https://app.presibo.com/trainers/profile?id=${post.trainer.id}"> <p>${post.trainer.username}</p></a>
                            </div>
                        </div>
                        <div class="post-description">${post.description}</div>
                        <div class="post-hashtags">
                            ${post.hashtags.map(tag => `<span>${tag}</span>`).join('')}
                        </div>
                    </div>

                    <div class="post-actions">
                        ${post.type === 'video' ? `
                        <button class="action-btn mute-btn ${isMutedGlobal ? 'muted' : ''}" onclick="toggleMuteAll()">
                            <div class="action-icon"><i class="fas ${isMutedGlobal ? 'fa-volume-mute' : 'fa-volume-up'} text-white"></i></div>
                            <span class="action-count text-[10px]">${isMutedGlobal ? 'Muted' : 'Unmuted'}</span>
                        </button>
                        ` : ''}
                        <button class="action-btn like-btn" onclick="toggleLike(${post.id})">
                            <div class="action-icon">❤️</div>
                            <span class="action-count like-count">${post.likes}</span>
                        </button>
                        <button class="action-btn comment-btn" onclick="showComments(${post.id})">
                            <div class="action-icon">💬</div>
                            <span class="action-count">${post.comments}</span>
                        </button>
                        <button class="action-btn share-btn" onclick="sharePost(${post.id})">
                            <div class="action-icon">📤</div>
                            <span class="action-count">${post.shares}</span>
                        </button>
                        <button class="action-btn profile-btn" onclick="viewProf('${post.trainer.id}')">
                           <a href="https://app.presibo.com/trainers/profile?id=${post.trainer.id}"><img src="${post.trainer.avatar}" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;"></a>
                        </button>
                    </div>

                    ${post.type === 'video' ? '<div class="play-pause-btn"><i class="fas fa-play text-2xl text-white opacity-80"></i></div>' : ''}
                `;

                // Insert media element
                postElement.insertBefore(mediaElement, postElement.firstChild);
                container.appendChild(postElement);

                // Create progress dot
                const progressDot = document.createElement('div');
                progressDot.className = 'progress-dot';
                if (index === 0) progressDot.classList.add('active');
                progressIndicator.appendChild(progressDot);
            });

            // Hide loading spinner when media loads
            setTimeout(() => {
                document.querySelectorAll('.loading-spinner').forEach(spinner => {
                    spinner.style.display = 'none';
                });
            }, 1000);
        }

        function updateProgressIndicator() {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPostIndex);
            });
        }

        function toggleLike(postId) {
            const likeBtn = event.target.closest('.like-btn');
            const likeCount = likeBtn.querySelector('.like-count');
            const post = timelinePosts.find(p => p.id === postId);
            
            if (likedPosts.has(postId)) {
                likedPosts.delete(postId);
                likeBtn.classList.remove('liked');
                post.likes--;
            } else {
                likedPosts.add(postId);
                likeBtn.classList.add('liked');
                post.likes++;
                
                // Add heart animation
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.cssText = `
                    position: absolute;
                    font-size: 60px;
                    pointer-events: none;
                    z-index: 1000;
                    animation: heartFloat 1s ease-out forwards;
                    left: 50%;
                    top: 50%;
                    transform: translate(-50%, -50%);
                `;
                
                // Add heart float animation
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes heartFloat {
                        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
                        50% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
                        100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
                    }
                `;
                document.head.appendChild(style);
                
                likeBtn.closest('.post').appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
            
            likeCount.textContent = post.likes;
        }

        function togglePlayPause(index) {
            const post = document.querySelector(`[data-index="${index}"]`);
            const video = post.querySelector('video');
            const playBtn = post.querySelector('.play-pause-btn');
            if (!video || !playBtn) return;

            if (playBtnTimeout) {
                clearTimeout(playBtnTimeout);
                playBtnTimeout = null;
            }
            
            if (video.paused) {
                video.play().catch(() => {});
                playBtn.innerHTML = '<i class="fas fa-play text-2xl text-white opacity-90"></i>';
                playBtn.classList.add('show');
                playBtnTimeout = setTimeout(() => {
                    playBtn.classList.remove('show');
                }, 800);
            } else {
                video.pause();
                playBtn.innerHTML = '<i class="fas fa-pause text-2xl text-white opacity-90"></i>';
                playBtn.classList.add('show');
                playBtnTimeout = setTimeout(() => {
                    playBtn.classList.remove('show');
                }, 800);
            }
        }

        function toggleMuteAll() {
            isMutedGlobal = !isMutedGlobal;
            document.querySelectorAll('video').forEach(video => {
                video.muted = isMutedGlobal;
            });
            document.querySelectorAll('.mute-btn').forEach(btn => {
                const icon = btn.querySelector('.action-icon');
                const text = btn.querySelector('.action-count');
                if (isMutedGlobal) {
                    icon.innerHTML = '<i class="fas fa-volume-mute text-sm text-white"></i>';
                    text.textContent = 'Muted';
                    btn.classList.add('muted');
                } else {
                    icon.innerHTML = '<i class="fas fa-volume-up text-sm text-white"></i>';
                    text.textContent = 'Unmuted';
                    btn.classList.remove('muted');
                }
            });
        }

        function showComments(postId) {
            alert('Comments feature coming soon!');
        }

        function sharePost(postId) {
            if (navigator.share) {
                navigator.share({
                    title: 'Check out this fitness tip!',
                    text: 'Amazing workout content from our trainer',
                    url: window.location.href
                });
            } else {
                // Fallback for browsers that don't support Web Share API
                alert('Share feature coming soon!');
            }
        }

        function viewProf(id) {
            window.location.href = `https://app.presibo.com/trainers/profile?id=${id}`;
        }

        // Handle back navigation safely
        function goBack() {
            // Check if there is history to go back to, else go to dashboard
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/dashboard';
            }
        }

        function showMenu() {
            alert('Menu options coming soon!');
        }

        // Handle scroll events
        function handleScroll() {
            const container = document.getElementById('timelineContainer');
            const posts = document.querySelectorAll('.post');
            const scrollTop = container.scrollTop;
            const windowHeight = window.innerHeight;
            
            // Determine current post
            let newCurrentIndex = Math.round(scrollTop / windowHeight);
            newCurrentIndex = Math.max(0, Math.min(newCurrentIndex, posts.length - 1));
            
            if (newCurrentIndex !== currentPostIndex) {
                // Pause and stop all other videos first
                document.querySelectorAll('video').forEach(video => {
                    video.pause();
                    video.currentTime = 0;
                });

                // Remove show class from all play/pause buttons
                document.querySelectorAll('.play-pause-btn').forEach(btn => {
                    btn.classList.remove('show');
                });
                
                currentPostIndex = newCurrentIndex;
                updateProgressIndicator();
                
                // Auto-play current video
                const currentPost = posts[currentPostIndex];
                const currentVideo = currentPost?.querySelector('video');
                if (currentVideo) {
                    currentVideo.muted = isMutedGlobal;
                    setTimeout(() => {
                        currentVideo.play().catch(() => {});
                        const playBtn = currentPost.querySelector('.play-pause-btn');
                        if (playBtn) playBtn.classList.remove('show');
                    }, 100);
                }
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchFeed();
            
            const container = document.getElementById('timelineContainer');
            let ticking = false;
            
            container.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        handleScroll();
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        });

        // Handle keyboard navigation
        document.addEventListener('keydown', (e) => {
            const container = document.getElementById('timelineContainer');
            const windowHeight = window.innerHeight;
            
            if (e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                container.scrollTo({
                    top: (currentPostIndex + 1) * windowHeight,
                    behavior: 'smooth'
                });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                container.scrollTo({
                    top: (currentPostIndex - 1) * windowHeight,
                    behavior: 'smooth'
                });
            }
        });

        // Handle touch gestures for better mobile experience
        let startY = 0;
        let startTime = 0;

        document.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            startTime = Date.now();
        });

        document.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            const endTime = Date.now();
            const deltaY = startY - endY;
            const deltaTime = endTime - startTime;
            
            // Only handle quick swipes
            if (deltaTime < 300 && Math.abs(deltaY) > 50) {
                const container = document.getElementById('timelineContainer');
                const windowHeight = window.innerHeight;
                
                if (deltaY > 0 && currentPostIndex < timelinePosts.length - 1) {
                    // Swipe up - next post
                    container.scrollTo({
                        top: (currentPostIndex + 1) * windowHeight,
                        behavior: 'smooth'
                    });
                } else if (deltaY < 0 && currentPostIndex > 0) {
                    // Swipe down - previous post
                    container.scrollTo({
                        top: (currentPostIndex - 1) * windowHeight,
                        behavior: 'smooth'
                    });
                }
            }
        });
    </script>
</body>
</html>
