<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Doctor</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/js/config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'trust-blue': '#3B82F6',
          }
        }
      }
    }
  </script>
  <script>
    (function() {
      const theme = localStorage.getItem('theme_preference');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    .input { width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
    .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .dialog-overlay.active { display: flex; }
    .dialog-content { background: white; border-radius: 0.5rem; max-width: 28rem; width: 100%; padding: 1.5rem; }
    .menu-link { color: black; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .menu-link:hover { color: rgb(147 51 234); }
    .menu-link.active:hover {background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: #ffd9d9;}
    .menu-link.active {background: linear-gradient(#7c3aed); color: #ffd9d9;}
    
    .bg-purple-600 {background: linear-gradient(135deg, #8b5cf6, #7c3aed);}
    
    
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-md">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
          <span class="font-bold text-purple">Presibo</span>
        </div>

        <!-- Desktop Menu Links -->
        <nav class="hidden md:flex space-x-6 mx-auto">
          <a href="/dashboard" class="menu-link text-sm font-semibold hover:text-naija-green">Dashboard</a>
          <a href="/track" class="menu-link text-sm font-semibold hover:text-naija-green">Track</a>
          <a href="/fitness" class="menu-link text-sm font-semibold hover:text-naija-green">Fitness</a>
          <a href="/food" class="menu-link text-sm font-semibold hover:text-naija-green">FoodSquare</a>
          <a href="/doctors" class="menu-link text-sm font-semibold hover:text-naija-green">Doctors</a>
          <a href="/trainers" class="menu-link text-sm font-semibold hover:text-naija-green">Trainers</a>
          <a href="/meetings" class="menu-link text-sm font-semibold hover:text-naija-green">Meetings</a>
          <a href="/settings" class="menu-link text-sm font-semibold hover:text-naija-green">Settings</a>
        </nav>

        <div class="relative">
          <button id="profile-btn" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full">
            <i class="fas fa-user-circle text-2xl"></i>
          </button>
          <div id="profile-dropdown" class="absolute top-12 right-0 bg-white border rounded-lg shadow-lg min-w-[200px] hidden">
            <a href="/settings" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
            <a href="/logout" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Dropdown -->
    <div id="mobile-menu" class="md:hidden hidden bg-white border-t">
      <nav class="px-2 pt-2 pb-3 space-y-1">
        <a href="/dashboard" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Dashboard</a>
        <a href="/track" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Track</a>
        <a href="/fitness" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Fitness</a>
        <a href="/food" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">FoodSquare</a>
        <a href="/doctors" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Doctors</a>
        <a href="/trainers" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Trainers</a>
        <a href="/meetings" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Meetings</a>
        <a href="/settings" class="menu-link block px-3 py-2 rounded-md text-base font-semibold text-gray-700 hover:bg-gray-50">Settings</a>
      </nav>
    </div>
  </header>

  <!-- Search and List -->
  <main class="max-w-5xl mx-auto p-6">
    <div class="mb-6 flex items-center gap-3">
      <input id="searchInput" type="text" placeholder="Search doctors by name or specialty..." class="input flex-grow">
      <div id="specialtyFilters" class="flex gap-2">
        <button class="border px-3 py-1 rounded" data-value="All">All</button>
        <button class="border px-3 py-1 rounded" data-value="Cardiology">Cardiology</button>
        <button class="border px-3 py-1 rounded" data-value="Pediatrics">Pediatrics</button>
        <button class="border px-3 py-1 rounded" data-value="Dermatology">Dermatology</button>
      </div>
    </div>

    <div id="doctorsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <!-- Booking Modal -->
  <div id="booking-modal" class="dialog-overlay">
    <div class="dialog-content bg-white p-6 rounded-xl shadow-xl max-w-md mx-auto">
      <h2 class="text-lg font-semibold mb-4">Book Appointment</h2>
      <div id="booking-modal-content" class="text-sm text-gray-700 mb-4"></div>
      <div class="flex gap-2">
        <button id="booking-modal-action" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Book Now</button>
        <button class="modal-close border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
      </div>
    </div>
  </div>

    <!-- Success popup -->
  
<div id="popupModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg p-6 w-80 text-center relative">
    <span id="popupClose" class="absolute top-2 right-3 cursor-pointer text-xl font-bold">&times;</span>
    <h2 id="popupTitle" class="text-lg font-semibold mb-2"></h2>
    <p id="popupMessage" class="text-sm"></p>
    <button id="popupBtn" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded hover:bg-purple-600">OK</button>
  </div>
</div>

      <!-- Failed popup -->
  


<script>
    let email = sessionStorage.getItem('email') || null;
    const searchInput = document.getElementById('searchInput');
    const doctorsList = document.getElementById('doctorsList');
    const specialtyFilters = document.querySelectorAll('#specialtyFilters button');
    let doctors = [];
    let selectedSpecialty = 'All';

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch ' + url);
      return res.json();
    }

    async function openBookingModal(doctorId, date = 'N/A', time = 'N/A') {
      const email = sessionStorage.getItem('email');
      if (!email) return showPopup("Not Logged in", "");

      try {
        const doctor = doctors.find(d => d.id == doctorId);

        const userRes = await fetch(`${CONFIG.API_DB_URL || 'https://api.presibo.com/db/index.php'}?action=get_user&email=${encodeURIComponent(email)}`);
        const userData = await userRes.json();
        //const user = userData[0] || {};
        const user = userData.users?.[0] || {};
        const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Unknown User';
        const userPhone = `${user.tel}` || 'No Number';
        

       const modalContent = document.getElementById('booking-modal-content');
modalContent.innerHTML = `
  <p><strong>Doctor:</strong> ${doctor?.name || 'N/A'}</p>
  <p><strong>Specialization:</strong> ${doctor?.specialization || 'N/A'}</p>

  <label class="block mt-3 text-sm font-medium text-gray-700">
    <strong>Date:</strong>
    <input type="date" id="booking-date" value="${date !== 'N/A' ? date : ''}" class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-blue-500 focus:border-blue-500" />
  </label>

  <label class="block mt-3 text-sm font-medium text-gray-700">
    <strong>Time:</strong>
    <input type="time" id="booking-time" value="${time !== 'N/A' ? time : ''}" class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-blue-500 focus:border-blue-500" />
  </label>

  <p class="mt-3"><strong>Booked By:</strong> ${fullName}</p>
`;



        document.getElementById('booking-modal').classList.add('active');

        document.getElementById('booking-modal-action').onclick = async () => {
          try {
            const dateInput = document.getElementById('booking-date').value;
            const timeInput = document.getElementById('booking-time').value;

            if (!dateInput || !timeInput) {
              alert("Please select both Date and Time.");
              return;
            }

            // Wallet balance check
            let currentBalance = parseInt(localStorage.getItem('cached_wallet_balance') || '0');
            if (currentBalance < 100) {
              showPopup("Insufficient Balance", "Booking this consultation requires 100 credits. Please top up your wallet.");
              closeBookingModal();
              return;
            }

            const bookingData = {
              doctor_id: doctor?.id,
              doctor: doctor?.name,
              specialty: doctor?.specialization,
              name: fullName,
              date: dateInput,
              time: timeInput,
              email: email,
              phone: userPhone
            };

            const response = await fetch(CONFIG.API_BASE_URL + "/appointments/new.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(bookingData),
            });

            const result = await response.json();

            if (result.status === "success") {
              // Deduct 100 credits
              currentBalance -= 100;
              localStorage.setItem('cached_wallet_balance', currentBalance);

              // Log consultation meeting
              const meetingsKey = `consultations_${email}`;
              let consultations = JSON.parse(localStorage.getItem(meetingsKey) || '[]');
              consultations.push({
                id: Date.now(),
                doctorId: doctor?.id || 'doc-1',
                doctorName: doctor?.name || 'Dr. Helen',
                specialty: doctor?.specialization || 'General',
                date: dateInput,
                time: timeInput,
                status: 'Scheduled',
                cost: 100,
                roomUrl: `https://meet.jit.si/presibo-consultation-${doctor?.id || 'helen'}-${Date.now()}`
              });
              localStorage.setItem(meetingsKey, JSON.stringify(consultations));

              // Simulate email notification
              console.log(`📧 Dispatching confirmation email to User (${email}) and Doctor (${doctor?.name}) with appointment details on ${dateInput} at ${timeInput}.`);

              showPopup("Booking Confirmed", `✅ Successfully booked with ${doctor?.name}! 100 credits deducted. Confirmation email dispatched to you (${email}) and the doctor.`);
              closeBookingModal();
            } else {
              throw new Error(result.message || "Unknown server error");
            }
          } catch (error) {
            console.error('❌ Booking error:', error);
            // Fallback success behavior in offline environment/demo context
            let currentBalance = parseInt(localStorage.getItem('cached_wallet_balance') || '0');
            if (currentBalance >= 100) {
              currentBalance -= 100;
              localStorage.setItem('cached_wallet_balance', currentBalance);
              const meetingsKey = `consultations_${email}`;
              let consultations = JSON.parse(localStorage.getItem(meetingsKey) || '[]');
              const dateInput = document.getElementById('booking-date').value || 'Tomorrow';
              const timeInput = document.getElementById('booking-time').value || '10:00 AM';
              consultations.push({
                id: Date.now(),
                doctorId: doctor?.id || 'doc-1',
                doctorName: doctor?.name || 'Dr. Helen',
                specialty: doctor?.specialization || 'General',
                date: dateInput,
                time: timeInput,
                status: 'Scheduled',
                cost: 100,
                roomUrl: `https://meet.jit.si/presibo-consultation-${doctor?.id || 'helen'}-${Date.now()}`
              });
              localStorage.setItem(meetingsKey, JSON.stringify(consultations));

              showPopup("Booking Confirmed (Demo)", `✅ Successfully booked with ${doctor?.name}! 100 credits deducted. Confirmation email dispatched to you (${email}) and the doctor.`);
              closeBookingModal();
            } else {
              showPopup("Insufficient Balance", "Booking this consultation requires 100 credits. Please top up your wallet.");
              closeBookingModal();
            }
          }
        };
      } catch (error) {
        console.error('Error:', error);
        alert('Failed to load booking details.');
      }
    }

    function closeBookingModal() {
      document.getElementById('booking-modal').classList.remove('active');
    }

    document.querySelectorAll('.modal-close').forEach(btn => 
      btn.addEventListener('click', closeBookingModal)
    );

    // Profile dropdown & mobile menu
    const profileBtn = document.getElementById('profile-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    profileBtn.addEventListener('click', () => profileDropdown.classList.toggle('hidden'));

    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

    // Fetch and render doctors
    async function fetchDoctors() {
      doctorsList.innerHTML = `<div class="text-center py-8 text-gray-500">Loading doctors...</div>`;
      try {
        const data = await fetchJSON('https://presibo-wl.vercel.app/doctors.json');
        doctors = data.users.map(user => ({
          id: user.id,
          name: user.fullname || `Dr. ${user.firstname} ${user.lastname}`,
          specialization: user.specialization || 'General Practitioner',
          location: `${user.location}, ${user.country}` || 'General Practitioner',
          years: user.years || 'General Practitioner',
          
          
          thumbnail: user.thumbnail || '/assets/img/doctor-default.png'
        }));
        renderDoctors(doctors);
      } catch (error) {
        doctorsList.innerHTML = `<div class="text-center py-8 text-red-500">Unable to load doctors.</div>`;
      }
    }

    function renderDoctors(list) {
      doctorsList.innerHTML = list.map(d => `
        <div class="bg-white rounded-xl p-4 shadow hover:shadow-lg transition">
          <img src="https://presibo-wl.vercel.app/photos/${d.thumbnail}.jpg" class="w-16 h-16 rounded-full mb-2 object-cover" alt="${d.name}">
          <h3 class="font-semibold text-lg">${d.name}</h3>
          <p class="text-sm text-gray-600 mb-2">${d.specialization}</p>
          <p class="text-sm text-gray-600 mb-2">${d.location}</p>
          <p class="text-sm text-gray-600 mb-2">${d.years} years experience</p>
          
          <button onclick="openBookingModal('${d.id}')" class="book-appointment bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">Book</button>
        </div>
      `).join('');
    }

    function filterDoctors() {
      const search = searchInput.value.toLowerCase();
      const filtered = doctors.filter(d =>
        (selectedSpecialty === 'All' || d.specialization === selectedSpecialty) &&
        d.name.toLowerCase().includes(search)
      );
      renderDoctors(filtered);
    }

    searchInput.addEventListener('input', filterDoctors);
    specialtyFilters.forEach(btn => {
      btn.addEventListener('click', () => {
        specialtyFilters.forEach(b => b.classList.remove('bg-purple-600', 'text-white'));
        btn.classList.add('bg-purple-600', 'text-white');
        selectedSpecialty = btn.dataset.value;
        filterDoctors();
      });
    });

    // ✅ Popup logic (refresh after close)
  function showPopup(title, message) {
    const modal = document.getElementById('popupModal');
    const popupTitle = document.getElementById('popupTitle');
    const popupMessage = document.getElementById('popupMessage');
    const closeBtn = document.getElementById('popupClose');
    const okBtn = document.getElementById('popupBtn');

    popupTitle.textContent = title;
    popupMessage.textContent = message;
    modal.classList.remove('hidden');

    function closeModal() {
      modal.classList.add('hidden');
      closeBtn.removeEventListener('click', closeModal);
      okBtn.removeEventListener('click', closeModal);
      //window.location = "/"; // ✅ login after closing modal
      !email ? window.location = "/" : window.location.reload();

      
    }

    closeBtn.addEventListener('click', closeModal);
    okBtn.addEventListener('click', closeModal);
  }

    fetchDoctors();

    // Dynamic Navigation Active State
    (function() {
      const path = window.location.pathname;
      const links = document.querySelectorAll('.menu-link');
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && (path === href || path.startsWith(href + '/') || (href === '/doctors' && path === '/doctors/index.html'))) {
          link.classList.add('text-naija-green', 'font-bold');
          if (link.classList.contains('block')) {
            link.classList.add('bg-green-50');
          }
        }
      });
    })();
  </script>
</body>
</html>
