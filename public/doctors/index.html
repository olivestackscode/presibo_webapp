<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presibo - Find Your Doctor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      outline: none;
    }
    .input:focus {
      ring: 2px;
      ring-color: #3b82f6;
      border-color: transparent;
    }
    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .dialog-overlay.active {
      display: flex;
    }
    .dialog-content {
      background: white;
      border-radius: 0.5rem;
      max-width: 28rem;
      width: 100%;
      padding: 1.5rem;
    }
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    <!-- Header -->
    <div class="bg-white shadow rounded-lg p-6">
      <div class="flex items-center gap-2 mb-4">
        <img src="https://via.placeholder.com/80?text=Presibo+Logo" alt="Presibo Logo" class="w-12 h-12 object-contain">
        <h1 class="text-xl font-bold text-gray-900">Find Your Doctor</h1>
      </div>
    </div>

    <!-- Main Card -->
    <div class="bg-white shadow rounded-lg p-6">
      <!-- Search and Filter -->
      <div class="mb-6">
        <div class="relative mb-4">
          <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input id="search-input" class="input pl-10" type="text" placeholder="Search doctors...">
        </div>
        <div class="flex space-x-2 overflow-x-auto pb-2">
          <button class="specialty-filter bg-green-600 text-white px-3 py-1 rounded-lg hover:bg-green-700" data-value="">All</button>
          <button class="specialty-filter border border-gray-200 text-gray-700 px-3 py-1 rounded-lg hover:bg-gray-100" data-value="General Practitioner">General Practitioner</button>
          <button class="specialty-filter border border-gray-200 text-gray-700 px-3 py-1 rounded-lg hover:bg-gray-100" data-value="Family Medicine">Family Medicine</button>
          <button class="specialty-filter border border-gray-200 text-gray-700 px-3 py-1 rounded-lg hover:bg-gray-100" data-value="Nutritionist">Nutritionist</button>
          <button class="specialty-filter border border-gray-200 text-gray-700 px-3 py-1 rounded-lg hover:bg-gray-100" data-value="Medical Officer">Medical Officer</button>
        </div>
      </div>

      <!-- Doctors List -->
      <div id="doctors-list" class="space-y-4"></div>
    </div>

    <!-- Modals -->
    <div id="call-modal" class="dialog-overlay">
      <div class="dialog-content">
        <h2 class="text-lg font-semibold mb-4">Call Doctor</h2>
        <div id="call-modal-content" class="text-sm text-gray-700 mb-4"></div>
        <div class="flex gap-2">
          <button id="call-modal-action" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Call Now</button>
          <button class="modal-close border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
        </div>
      </div>
    </div>
    <div id="message-modal" class="dialog-overlay">
      <div class="dialog-content">
        <h2 class="text-lg font-semibold mb-4">Message Doctor</h2>
        <div id="message-modal-content" class="text-sm text-gray-700 mb-4"></div>
        <div class="flex gap-2">
          <button id="message-modal-action" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Send Message</button>
          <button class="modal-close border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
        </div>
      </div>
    </div>
    <div id="booking-modal" class="dialog-overlay">
      <div class="dialog-content">
        <h2 class="text-lg font-semibold mb-4">Book Appointment</h2>
        <div id="booking-modal-content" class="text-sm text-gray-700 mb-4"></div>
        <div class="flex gap-2">
          <button id="booking-modal-action" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Book Now</button>
          <button class="modal-close border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Mock doctor data
    const doctors = [
      {
        id: 1,
        name: "Dr. John Doe",
        firstname: "John",
        lastname: "Doe",
        email: "john.doe@example.com",
        phone: "08012345678",
        specialization: "General Practitioner",
        specialty: "General Practitioner",
        location: "Lagos, Nigeria",
        country: "Nigeria",
        years: 10,
        cases: "500+",
        rating: 4.8,
        thumbnail: null
      },
      {
        id: 2,
        name: "Dr. Jane Smith",
        firstname: "Jane",
        lastname: "Smith",
        email: "jane.smith@example.com",
        phone: "08087654321",
        specialization: "Nutritionist",
        specialty: "Nutritionist",
        location: "Abuja, Nigeria",
        country: "Nigeria",
        years: 7,
        cases: "300+",
        rating: 4.5,
        thumbnail: null
      }
    ];

    // DOM elements
    const doctorsList = document.getElementById('doctors-list');
    const searchInput = document.getElementById('search-input');
    const specialtyFilters = document.querySelectorAll('.specialty-filter');
    const callModal = document.getElementById('call-modal');
    const messageModal = document.getElementById('message-modal');
    const bookingModal = document.getElementById('booking-modal');
    const callModalContent = document.getElementById('call-modal-content');
    const messageModalContent = document.getElementById('message-modal-content');
    const bookingModalContent = document.getElementById('booking-modal-content');
    let selectedSpecialty = '';

    // Doctor image helper
    function getDoctorImage(thumbnail) {
      if (!thumbnail || typeof thumbnail !== 'string') {
        return null;
      }
      return thumbnail.includes('.') ? thumbnail : `${thumbnail}.jpg`;
    }

    // Render doctors
    function renderDoctors(doctors) {
      doctorsList.innerHTML = '';
      if (doctors.length === 0) {
        doctorsList.innerHTML = `
          <div class="text-center py-8 text-gray-500">
            <svg class="w-10 h-10 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <p>No doctors found matching your criteria</p>
          </div>
        `;
        return;
      }

      doctors.forEach((doctor, index) => {
        const card = document.createElement('div');
        card.className = 'border border-gray-100 bg-white rounded-lg p-4';
        card.innerHTML = `
          <div class="flex items-start space-x-4">
            <div class="w-16 h-16 rounded-full overflow-hidden">
              ${getDoctorImage(doctor.thumbnail) ? `
                <img src="https://presibo-wl.vercel.app/photos/${getDoctorImage(doctor.thumbnail)}" alt="${doctor.name}" class="w-full h-full object-cover">
              ` : `
                <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-purple-600 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
                </div>
              `}
            </div>
            <div class="flex-1">
              <h3 class="font-semibold text-lg">${doctor.name}</h3>
              <p class="text-sm text-gray-600 mb-1">${doctor.specialization}</p>
              <div class="flex items-center space-x-3 mb-2">
                <div class="flex items-center space-x-1">
                  <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                  <span class="text-xs text-gray-500">${doctor.location}</span>
                </div>
                <div class="flex items-center space-x-1">
                  <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"></path></svg>
                  <span class="text-xs text-gray-500">${doctor.years} years experience</span>
                </div>
                ${doctor.cases ? `
                  <div class="flex items-center space-x-1">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span class="text-xs text-gray-500">${doctor.cases} cases</span>
                  </div>
                ` : ''}
              </div>
              <div class="flex items-center space-x-4 mb-3">
                <div class="flex items-center space-x-1">
                  <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                  <span class="text-sm font-medium">${doctor.rating || 4.5}</span>
                  <span class="text-xs text-gray-500">(${Math.floor(Math.random() * 50) + 10} reviews)</span>
                </div>
              </div>
              <div class="flex space-x-2">
                <button class="book-appointment flex-1 bg-blue-600 text-white text-sm font-medium py-2 rounded-lg hover:bg-blue-700" data-id="${doctor.id}">Book Appointment</button>
                <button class="message-doctor border border-gray-200 text-blue-600 px-4 py-2 rounded-lg hover:bg-gray-100" data-id="${doctor.id}">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </button>
                ${doctor.phone ? `
                  <button class="call-doctor border border-gray-200 text-green-600 px-4 py-2 rounded-lg hover:bg-gray-100" data-id="${doctor.id}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                  </button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
        doctorsList.appendChild(card);
      });
    }

    // Filter doctors
    function filterDoctors() {
      const searchQuery = searchInput.value.toLowerCase();
      const filtered = doctors.filter(doctor => {
        const matchesSearch = doctor.name.toLowerCase().includes(searchQuery) ||
                             doctor.specialty.toLowerCase().includes(searchQuery) ||
                             doctor.location.toLowerCase().includes(searchQuery);
        const matchesSpecialty = !selectedSpecialty || 
                                doctor.specialization.includes(selectedSpecialty) ||
                                doctor.specialty.includes(selectedSpecialty);
        return matchesSearch && matchesSpecialty;
      });
      renderDoctors(filtered);
    }

    // Initial render
    renderDoctors(doctors);

    // Search and filter events
    searchInput.addEventListener('input', filterDoctors);
    specialtyFilters.forEach(button => {
      button.addEventListener('click', () => {
        specialtyFilters.forEach(btn => {
          btn.className = 'specialty-filter border border-gray-200 text-gray-700 px-3 py-1 rounded-lg hover:bg-gray-100';
        });
        button.className = 'specialty-filter bg-green-600 text-white px-3 py-1 rounded-lg hover:bg-green-700';
        selectedSpecialty = button.dataset.value;
        filterDoctors();
      });
    });

    // Modal handlers
    function openModal(modal, content, doctor) {
      modal.querySelector('.dialog-content').querySelector('div').innerHTML = content;
      modal.classList.add('active');
    }

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-close')) {
        callModal.classList.remove('active');
        messageModal.classList.remove('active');
        bookingModal.classList.remove('active');
      } else if (e.target.classList.contains('book-appointment') || e.target.parentElement.classList.contains('book-appointment')) {
        const id = e.target.dataset.id || e.target.parentElement.dataset.id;
        const doctor = doctors.find(d => d.id == id);
        alert('Appointment booking is disabled in this demo.');
        openModal(bookingModal, `Book an appointment with ${doctor.name}, ${doctor.specialization} in ${doctor.location}.`, doctor);
      } else if (e.target.classList.contains('message-doctor') || e.target.parentElement.classList.contains('message-doctor')) {
        const id = e.target.dataset.id || e.target.parentElement.dataset.id;
        const doctor = doctors.find(d => d.id == id);
        alert('Doctor messaging is disabled in this demo.');
        openModal(messageModal, `Send a message to ${doctor.name}, ${doctor.specialization}.`, doctor);
      } else if (e.target.classList.contains('call-doctor') || e.target.parentElement.classList.contains('call-doctor')) {
        const id = e.target.dataset.id || e.target.parentElement.dataset.id;
        const doctor = doctors.find(d => d.id == id);
        alert('Doctor calling is disabled in this demo.');
        openModal(callModal, `Call ${doctor.name} at ${doctor.phone}.`, doctor);
      }
    });

    // Modal action buttons
    document.getElementById('call-modal-action').addEventListener('click', () => {
      alert('Doctor calling is disabled in this demo.');
    });
    document.getElementById('message-modal-action').addEventListener('click', () => {
      alert('Doctor messaging is disabled in this demo.');
    });
    document.getElementById('booking-modal-action').addEventListener('click', () => {
      alert('Appointment booking is disabled in this demo.');
    });
  </script>
</body>
</html>
