<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presibo - Find Your Doctor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'trust-blue': '#3B82F6',
          }
        }
      }
    }
  </script>
  <style>
    .input { width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
    .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .dialog-overlay.active { display: flex; }
    .dialog-content { background: white; border-radius: 0.5rem; max-width: 28rem; width: 100%; padding: 1.5rem; }
    .menu-link { color: #374151; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .menu-link:hover { color: #008753; }
    .menu-link.active { background-color: #008753; color: white; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Left: Brand -->
        <div class="flex items-center space-x-2">
          <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-md">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
          <span class="font-bold text-purple">Presibo</span>
        </div>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex space-x-4">
          <a href="/dashboard" class="menu-link">Dashboard</a>
          <a href="/vitals" class="menu-link">Vitals</a>
          <a href="/insights" class="menu-link">Insights</a>
          <a href="/community" class="menu-link">Community</a>
          <a href="/doctors" class="menu-link active">Doctors</a>
        </nav>

        <!-- Profile -->
        <div class="relative">
          <button id="profile-btn" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full">
            <i class="fas fa-user-circle text-2xl"></i>
          </button>
          <div id="profile-dropdown" class="absolute top-12 right-0 bg-white border rounded-lg shadow-lg min-w-[200px] hidden">
            <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
            <a href="/settings" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
            <a href="/logout" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
      <nav class="px-2 pt-2 pb-3 space-y-1">
        <a href="/dashboard" class="menu-link block">Dashboard</a>
        <a href="/vitals" class="menu-link block">Vitals</a>
        <a href="/insights" class="menu-link block">Insights</a>
        <a href="/community" class="menu-link block">Community</a>
        <a href="/doctors" class="menu-link active block">Doctors</a>
      </nav>
    </div>
  </header>

  <!-- Doctor Booking Modal -->
  <div id="booking-modal" class="dialog-overlay hidden">
    <div class="dialog-content">
      <h2 class="text-lg font-semibold mb-4">Book Appointment</h2>
      <div id="booking-modal-content" class="text-sm text-gray-700 mb-4"></div>
      <div class="flex gap-2 justify-end">
        <button id="booking-modal-action" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Book Now</button>
        <button class="modal-close border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
      </div>
    </div>
  </div>

  <script>
  // Dummy doctor data for demo
  const doctors = [
    { id: 1, name: "Dr. Ada Lovelace", specialization: "Cardiologist", location: "Lagos" },
    { id: 2, name: "Dr. Emeka Okoro", specialization: "General Practitioner", location: "Abuja" }
  ];

  const bookingModal = document.getElementById('booking-modal');
  const bookingModalContent = document.getElementById('booking-modal-content');
  const bookBtn = document.getElementById('booking-modal-action');
  let selectedDoctor = null;

  // Open booking modal
  function openBookingModal(doctor) {
    selectedDoctor = doctor;
    bookingModal.classList.remove('hidden');
    bookingModalContent.innerHTML = `
      <p>You're booking with <strong>${doctor.name}</strong> (${doctor.specialization}) in <strong>${doctor.location}</strong>.</p>
      <label class="block mt-3 font-medium">Date</label>
      <input type="date" id="appointment-date" class="input mb-3">
      <label class="block font-medium">Time</label>
      <input type="time" id="appointment-time" class="input mb-3">
      <label class="block font-medium">Reason</label>
      <textarea id="description" class="input"></textarea>
    `;
  }

  // Close modal
  document.querySelectorAll('.modal-close').forEach(btn => {
    btn.addEventListener('click', () => {
      bookingModal.classList.add('hidden');
      window.location.reload();
    });
  });

  // Example trigger (replace with dynamic doctor list later)
  document.body.insertAdjacentHTML('beforeend', `<button class="book-appointment bg-green-600 text-white p-3 rounded-lg mt-6 ml-6" onclick="openBookingModal(doctors[0])">Book Dr. Ada</button>`);

  // Fetch user details
  async function fetchUserDetails() {
    const email = sessionStorage.getItem('email');
    if (!email) return null;
    try {
      const response = await fetch(`https://api.presibo.com/db/index.php?action=get_user&email=${encodeURIComponent(email)}`);
      const data = await response.json();
      return data.user || data;
    } catch (err) {
      console.error(err);
      return null;
    }
  }

  // Handle booking
  bookBtn.addEventListener('click', async () => {
    const date = document.getElementById('appointment-date').value;
    const time = document.getElementById('appointment-time').value;
    const description = document.getElementById('description').value;
    const user = await fetchUserDetails();
    if (!user || !date || !time) {
      alert('Please fill all fields.');
      return;
    }

    const payload = {
      name: `${user.FirstName} ${user.LastName}`,
      email: user.Email,
      phone: user.Phone,
      doctor: selectedDoctor.name,
      doctor_id: selectedDoctor.id,
      specialty: selectedDoctor.specialization,
      location: selectedDoctor.location,
      date,
      time,
      description
    };

    const res = await fetch('https://api.presibo.com/new.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    alert(result.success ? '✅ Appointment booked!' : '❌ Booking failed.');
    bookingModal.classList.add('hidden');
    window.location.reload();
  });

  // Header interactions
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  const profileBtn = document.getElementById('profile-btn');
  const profileDropdown = document.getElementById('profile-dropdown');

  mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
  profileBtn.addEventListener('click', () => profileDropdown.classList.toggle('hidden'));

  document.addEventListener('click', (e) => {
    if (!profileBtn.contains(e.target)) profileDropdown.classList.add('hidden');
  });
  </script>

</body>
</html>
