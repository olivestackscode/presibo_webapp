<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presibo - Find Your Doctor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'trust-blue': '#3B82F6',
          }
        }
      }
    }
  </script>
  <style>
    .input { width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
    .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .dialog-overlay.active { display: flex; }
    .dialog-content { background: white; border-radius: 0.5rem; max-width: 28rem; width: 100%; padding: 1.5rem; }
    .menu-link { color: #374151; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .menu-link:hover { color: #008753; }
    .menu-link.active { background-color: #008753; color: white; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Left: Brand -->
        <div class="flex items-center space-x-2">
          <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-md">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
          <span class="font-bold text-purple">Presibo</span>
        </div>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex space-x-4">
          <a href="/dashboard" class="menu-link">Dashboard</a>
          <a href="/vitals" class="menu-link">Vitals</a>
          <a href="/insights" class="menu-link">Insights</a>
          <a href="/community" class="menu-link">Community</a>
          <a href="/doctors" class="menu-link active">Doctors</a>
        </nav>

        <!-- Profile -->
        <div class="relative">
          <button id="profile-btn" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full">
            <i class="fas fa-user-circle text-2xl"></i>
          </button>
          <div id="profile-dropdown" class="absolute top-12 right-0 bg-white border rounded-lg shadow-lg min-w-[200px] hidden">
            <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
            <a href="/settings" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
            <a href="/logout" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
      <nav class="px-2 pt-2 pb-3 space-y-1">
        <a href="/dashboard" class="menu-link block">Dashboard</a>
        <a href="/vitals" class="menu-link block">Vitals</a>
        <a href="/insights" class="menu-link block">Insights</a>
        <a href="/community" class="menu-link block">Community</a>
        <a href="/doctors" class="menu-link active block">Doctors</a>
      </nav>
    </div>
  </header>

  <!-- Booking Modal -->
  <div id="booking-modal" class="dialog-overlay">
    <div class="dialog-content bg-white p-6 rounded-xl shadow-xl max-w-md mx-auto">
      <h2 class="text-lg font-semibold mb-4">Book Appointment</h2>
      <div id="booking-modal-content" class="text-sm text-gray-700 mb-4"></div>
      <div class="flex gap-2">
        <button id="booking-modal-action" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Book Now</button>
        <button class="modal-close border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Helper: Fetch JSON
    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch ' + url);
      return res.json();
    }

    // Open booking modal
    async function openBookingModal(doctorId, date, time) {
      const email = sessionStorage.getItem('email');
      if (!email) {
        alert('No session stored');
        return;
      }

      try {
        // Fetch doctors
        const doctors = await fetchJSON('https://presibo-wl.vercel.app/doctors.json');
        const doctor = doctors.find(doc => doc.id == doctorId);

        // Fetch user info
        const userRes = await fetch(`https://api.presibo.com/db/index.php?action=get_user&email=${encodeURIComponent(email)}`);
        const userData = await userRes.json();
        const user = userData[0] || {};
        const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Unknown User';

        // Fill modal
        const modalContent = document.getElementById('booking-modal-content');
        modalContent.innerHTML = `
          <p><strong>Doctor:</strong> ${doctor?.name || 'N/A'}</p>
          <p><strong>Specialization:</strong> ${doctor?.specialization || 'N/A'}</p>
          <p><strong>Date:</strong> ${date}</p>
          <p><strong>Time:</strong> ${time}</p>
          <p><strong>Booked By:</strong> ${fullName}</p>
        `;

        // Show modal
        document.getElementById('booking-modal').classList.add('active');

        // Book Now
        document.getElementById('booking-modal-action').onclick = () => {
          alert(`Appointment booked with ${doctor?.name || 'Doctor'} by ${fullName} on ${date} at ${time}.`);
          closeBookingModal();
        };

      } catch (error) {
        console.error('Error:', error);
        alert('Failed to load booking details.');
      }
    }

    function closeBookingModal() {
      document.getElementById('booking-modal').classList.remove('active');
    }

    document.querySelectorAll('.modal-close').forEach(btn => 
      btn.addEventListener('click', closeBookingModal)
    );

    // Example call
    // openBookingModal(1, '2025-10-12', '3:45 PM');

    // Header Interactions
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const profileBtn = document.getElementById('profile-btn');
    const profileDropdown = document.getElementById('profile-dropdown');

    mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
    profileBtn.addEventListener('click', () => profileDropdown.classList.toggle('hidden'));

    document.addEventListener('click', (e) => {
      if (!profileBtn.contains(e.target)) profileDropdown.classList.add('hidden');
    });

    // Fetch doctors from API
async function fetchDoctors() {
  doctorsList.innerHTML = `
    <div class="animate-pulse">
      <div class="bg-gray-200 rounded-xl p-4 h-32 mb-4"></div>
      <div class="bg-gray-200 rounded-xl p-4 h-32 mb-4"></div>
      <div class="bg-gray-200 rounded-xl p-4 h-32"></div>
    </div>
  `;
  try {
    const response = await fetch('https://presibo-wl.vercel.app/doctors.json');
    if (!response.ok) throw new Error('Failed to fetch doctors');
    const data = await response.json();
    doctors = data.users.map(user => ({
      id: user.id,
      name: user.fullname || `${user.firstname} ${user.lastname}`,
      firstname: user.firstname,
      midname: user.midname,
      lastname: user.lastname,
      specialization: user.specialization || 'General Practitioner',
      location: user.location || 'Nigeria',
      years: user.years || Math.floor(Math.random() * 10) + 1,
      phone: user.phone,
      thumbnail: user.thumbnail,
      rating: user.rating || (Math.random() * 1 + 4).toFixed(1),
      cases: user.cases || Math.floor(Math.random() * 120) + 10,
      distance: user.distance || `${Math.floor(Math.random() * 10) + 1} km away`
    }));
    renderDoctors(doctors);
  } catch (error) {
    doctorsList.innerHTML = `
      <div class="text-center py-8 text-gray-500">
        <p>Unable to load doctors. Please try again later.</p>
      </div>
    `;
    console.error(error);
  }
}

// Event listeners
searchInput.addEventListener('input', filterDoctors);
specialtyFilters.forEach(btn => {
  btn.addEventListener('click', () => {
    specialtyFilters.forEach(b => b.classList.remove('bg-green-600', 'text-white'));
    btn.classList.add('bg-green-600', 'text-white');
    selectedSpecialty = btn.dataset.value;
    filterDoctors();
  });
});

// Handle modals
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-close')) {
    e.target.closest('.dialog-overlay').classList.remove('active');
  }
});

// Booking button handler
document.addEventListener('click', e => {
  if (e.target.closest('.book-appointment')) {
    const doctorId = e.target.closest('.book-appointment').dataset.id;
    window.location.href = `/booker-new.html?doctor=${doctorId}`;
  }
});

// Message and call button handlers
document.addEventListener('click', e => {
  const msgBtn = e.target.closest('.message-doctor');
  const callBtn = e.target.closest('.call-doctor');
  if (msgBtn) {
    const doctorId = msgBtn.dataset.id;
    const doctor = doctors.find(d => d.id == doctorId);
    messageModalContent.innerHTML = `<p>Message <strong>${doctor.name}</strong></p>`;
    messageModal.classList.add('active');
  }
  if (callBtn) {
    const doctorId = callBtn.dataset.id;
    const doctor = doctors.find(d => d.id == doctorId);
    callModalContent.innerHTML = `<p>Call <strong>${doctor.name}</strong> at ${doctor.phone || 'N/A'}</p>`;
    callModal.classList.add('active');
  }
});

// Fetch initial data
fetchDoctors();
  </script>
</body>
</html>
