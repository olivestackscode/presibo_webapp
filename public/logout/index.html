<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logging Out - Presibo</title>
  <meta name="description" content="Logging you out of Presibo. Redirecting to home...">
  <link rel="canonical" href="https://app.presibo.com/logout">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="text-center p-8 bg-white rounded-lg shadow-lg max-w-md w-full mx-4">
    <div class="w-16 h-16 bg-naija-green rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-sign-out-alt text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">Logging Out</h1>
    
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-naija-green mx-auto"></div>
  </div>

  <script>
    // Clear client-side session
    sessionStorage.clear();
    localStorage.clear();

    // Optional: Call API to destroy server-side session
    fetch('/api?action=logout', {
      method: 'POST',
      credentials: 'include'
    }).catch(err => console.error('Logout API error:', err));

    // Redirect after a short delay
    setTimeout(() => {
      window.location.href = '/';
    }, 2000);
  </script>
</body>
</html>
