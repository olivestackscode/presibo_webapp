<script>
  // Fetch doctors from API
  async function loadDoctors() {
    try {
      const response = await fetch('https://presibo-wl.vercel.app/doctors.json');
      if (!response.ok) throw new Error('Failed to fetch doctors');
      const data = await response.json();
      const doctors = data.users || [];
      const select = document.getElementById('doctor');
      select.innerHTML = '<option value="">Select a doctor</option>';
      doctors.forEach(doctor => {
        const option = document.createElement('option');
        option.value = doctor.id;
        option.textContent = `Dr. ${doctor.firstname} ${doctor.lastname} - ${doctor.specialization} • ${doctor.location}`;
        select.appendChild(option);
      });
    } catch (error) {
      console.error('Error loading doctors:', error);
      const select = document.getElementById('doctor');
      select.innerHTML = '<option value="">Error loading doctors</option>';
    }
  }

  document.addEventListener('DOMContentLoaded', loadDoctors);

  const form = document.getElementById('booking-form');
  const submitBtn = document.getElementById('submit-btn');
  let isSubmitting = false;

  function validateForm(data) {
    const errors = {};
    if (data.name.length < 2) errors.name = 'Name must be at least 2 characters';
    if (!data.email.includes('@')) errors.email = 'Please enter a valid email address';
    if (data.phone.length < 10) errors.phone = 'Phone number must be at least 10 digits';
    if (!data.dateOfBirth) errors.dateOfBirth = 'Date of birth is required';
    if (!data.sex) errors.sex = 'Please select your gender';
    if (!data.location) errors.location = 'Location is required';
    if (!data.doctorId || data.doctorId === '0') errors.doctorId = 'Please select a doctor';
    return errors;
  }

  function showErrors(errors) {
    Object.keys(errors).forEach(key => {
      const errorEl = document.getElementById(`${key}-error`);
      if (errorEl) {
        errorEl.textContent = errors[key];
        errorEl.classList.remove('hidden');
      }
    });
  }

  function clearErrors() {
    document.querySelectorAll('.error-message').forEach(el => {
      el.classList.add('hidden');
      el.textContent = '';
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    data.doctorId = parseInt(data.doctorId);

    clearErrors();
    const errors = validateForm(data);
    if (Object.keys(errors).length > 0) {
      showErrors(errors);
      return;
    }

    console.log("🟦 Submitting appointment data:", data);

    isSubmitting = true;
    submitBtn.innerHTML = `
      <div class="flex items-center gap-2">
        <div class="spinner"></div>
        Submitting Booking...
      </div>
    `;
    submitBtn.disabled = true;
    form.classList.add('loading');

    try {
      const response = await fetch('https://api.presibo.com/appointments/new.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      console.log("🟩 Raw response:", response.status, response.statusText);

      const result = await response.json().catch(() => null);
      console.log("🟨 Response JSON:", result);

      if (!response.ok || !result || result.status !== 'success') {
        throw new Error(result?.message || 'Booking failed');
      }

      alert('✅ Booking Submitted Successfully!\n\nThank you for your booking. Our team will contact you soon.');
      console.log("✅ Appointment saved:", result.appointment);

      form.reset();
    } catch (error) {
      console.error('❌ Booking error:', error);
      alert(`Booking Failed ❌\n\n${error.message || "Error submitting your booking. Check console for details."}`);
    } finally {
      isSubmitting = false;
      submitBtn.innerHTML = `
        <div class="flex items-center gap-2">
          <i class="fas fa-calendar w-5 h-5"></i>
          Book Appointment
        </div>
      `;
      submitBtn.disabled = false;
      form.classList.remove('loading');
    }
  });
</script>
