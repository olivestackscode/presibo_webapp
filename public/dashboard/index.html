<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="keywords" content="Presibo, health dashboard, AI healthcare, meal tracking, blood pressure, blood sugar, Nigerian foods, telemedicine">
  <meta name="author" content="Presibo Team">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://app.presibo.com/dashboard">

  <!-- Favicon Meta Tags -->
  <link rel="icon" type="image/png" href="assets/img/new_presibo_icon.png">
  <link rel="apple-touch-icon" href="assets/img/new_presibo_icon.png">
  <meta name="msapplication-TileImage" content="assets/img/new_presibo_icon.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Presibo - Your Health Dashboard">
  <meta name="twitter:description" content="Presibo’s AI dashboard helps you track meals, health metrics, and Nigerian food recommendations for better health.">
  <meta name="twitter:image" content="https://app.presibo.com/assets/img/new_presibo_icon.png">
  <meta name="twitter:image:alt" content="Presibo Logo">
  <meta name="twitter:site" content="@PresiboHealth">

  <!-- Web App Manifest (PWA) -->
  <link rel="manifest" href="assets/manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600;1,700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'golden-yellow': '#FFC107',
            'warm-orange': '#F97316',
            'royal-purple': '#6B21A8',
            'health-pink': '#EC4899',
            'trust-blue': '#3B82F6',
            'health-gradient': 'linear-gradient(to right, #10B981, #3B82F6)',
            'info-gradient': 'linear-gradient(to right, #F97316, #FBBF24)',
            'warning-gradient': 'linear-gradient(to right, #EF4444, #F97316)'
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <style>
    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .dialog-overlay.active {
      display: flex;
    }
    .dialog-content {
      background: white;
      border-radius: 0.5rem;
      max-width: 28rem;
      width: 100%;
      padding: 1.5rem;
    }
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .camera-preview {
      background: linear-gradient(to bottom, #3B82F6, #10B981);
    }
    .notification-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      min-width: 300px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 50;
      display: none;
    }
    .notification-dropdown.active {
      display: block;
    }
    .notification-item {
      padding: 1rem;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }
    .notification-item:last-child {
      border-bottom: none;
    }
    .notification-item.unread {
      background-color: #f9fafb;
    }
    .menu-link {
      @apply text-gray-700 hover:text-naija-green px-3 py-2 rounded-md text-sm font-medium;
    }
    .menu-link.active {
      @apply bg-naija-green text-white;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 font-sans">
  <!-- Header with Menu Bar -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Mobile menu button -->
        <button id="mobile-menu-btn" class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100">
          <span class="sr-only">Open main menu</span>
          <i class="fas fa-bars text-xl"></i>
        </button>

        <!-- Desktop Menu Links -->
        <nav class="hidden md:flex space-x-8">
          <a href="/dashboard" class="menu-link active">Dashboard</a>
          <a href="/vitals" class="menu-link">Vitals</a>
          <a href="/meals" class="menu-link">Meals</a>
          <a href="/reports" class="menu-link">Reports</a>
          <a href="/community" class="menu-link">Community</a>
          <a href="/support" class="menu-link">Support</a>
        </nav>

        <!-- Right Side: Notifications, Profile -->
        <div class="flex items-center space-x-4">
          <!-- Notification Bell -->
          <div class="relative">
            <button id="notification-btn" class="p-2 text-gray-400 hover:text-gray-500 hover:bg-gray-100 rounded-full relative">
              <i class="fas fa-bell text-xl"></i>
              <span id="notification-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">3</span>
            </button>
            <div id="notification-dropdown" class="notification-dropdown">
              <div class="p-4 border-b">
                <h4 class="font-semibold text-sm">Notifications</h4>
              </div>
              <div id="notification-list">
                <!-- Dynamic notifications will be populated here -->
              </div>
            </div>
          </div>

          <!-- Profile Icon -->
          <div class="relative">
            <button id="profile-btn" class="p-2 text-gray-400 hover:text-gray-500 hover:bg-gray-100 rounded-full">
              <i class="fas fa-user-circle text-2xl"></i>
            </button>
            <div class="absolute top-10 right-0 bg-white border rounded-lg shadow-lg min-w-[200px] hidden" id="profile-dropdown">
              <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
              <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Settings</a>
              <a href="/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</a>
            </div>
          </div>
        </div>

        <!-- Brand Logo and Name (Top Right, but since menu is left, place after menu for desktop) -->
        <div class="hidden md:flex items-center space-x-2 ml-auto">
          <img src="assets/img/new_presibo_icon.png" alt="Presibo Logo" class="h-8 w-8">
          <span class="font-bold text-naija-green">Presibo</span>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Dropdown -->
    <div id="mobile-menu" class="md:hidden hidden bg-white border-t">
      <nav class="px-2 pt-2 pb-3 space-y-1">
        <a href="/dashboard" class="menu-link active block">Dashboard</a>
        <a href="/vitals" class="menu-link block">Vitals</a>
        <a href="/meals" class="menu-link block">Meals</a>
        <a href="/reports" class="menu-link block">Reports</a>
        <a href="/community" class="menu-link block">Community</a>
        <a href="/support" class="menu-link block">Support</a>
      </nav>
    </div>
  </header>

  <div id="dashboard" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6 py-6">
    <!-- Loading State -->
    <div id="loading" class="hidden animate-pulse space-y-6">
      <div class="bg-white rounded-2xl p-6 h-32"></div>
      <div class="bg-white rounded-2xl p-6 h-48"></div>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl p-4 h-32"></div>
        <div class="bg-white rounded-2xl p-4 h-32"></div>
      </div>
    </div>

    <!-- Quick Action Buttons -->
    <div class="bg-white rounded-2xl shadow p-6">
      <h3 class="text-lg font-semibold mb-4">Quick Actions</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a href="/track-vitals" class="bg-health-gradient rounded-xl p-4 text-white text-center hover:shadow-lg transition-shadow">
          <i class="fas fa-chart-line text-xl mb-2 block"></i>
          <span class="text-sm font-medium">Track Vitals</span>
        </a>
        <a href="/ai-doc" class="bg-trust-blue rounded-xl p-4 text-white text-center hover:shadow-lg transition-shadow">
          <i class="fas fa-robot text-xl mb-2 block"></i>
          <span class="text-sm font-medium">AI Doc</span>
        </a>
        <a href="/fitness" class="bg-warm-orange rounded-xl p-4 text-white text-center hover:shadow-lg transition-shadow">
          <i class="fas fa-dumbbell text-xl mb-2 block"></i>
          <span class="text-sm font-medium">Fitness</span>
        </a>
        <a href="/pulse-fitness-videos" class="bg-health-pink rounded-xl p-4 text-white text-center hover:shadow-lg transition-shadow">
          <i class="fas fa-video text-xl mb-2 block"></i>
          <span class="text-sm font-medium">Pulse Fitness Videos</span>
        </a>
      </div>
    </div>

    <!-- Welcome Section -->
    <div id="welcome-section" class="bg-white rounded-2xl shadow p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 id="greeting" class="text-2xl font-bold text-gray-800"></h2>
          <p class="text-gray-600 text-sm">Let's track your health today</p>
        </div>
        <div class="text-right flex flex-col space-y-2">
          <button id="subscribe-btn" class="bg-golden-yellow hover:bg-golden-yellow/90 text-black text-xs px-3 py-1 rounded-lg">
            <i class="fas fa-crown mr-1"></i>Subscribe
          </button>
          <div>
            <div class="text-sm text-gray-500">Today</div>
            <div id="current-date" class="text-lg font-semibold text-naija-green"></div>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="health-gradient rounded-xl p-4 text-white">
          <div class="flex items-center space-x-2">
            <i class="fas fa-apple-alt"></i>
            <span class="text-sm">Health Score</span>
          </div>
          <div id="health-score" class="text-2xl font-bold mt-1">8.2</div>
          <div class="text-xs opacity-90">Excellent</div>
        </div>
        <div class="info-gradient rounded-xl p-4 text-white">
          <div class="flex
