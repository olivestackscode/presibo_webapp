<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Video Room - Presibo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://meet.jit.si/external_api.js"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'trust-blue': '#3B82F6',
          }
        }
      }
    }
  </script>
  <script>
    (function() {
      const theme = localStorage.getItem('theme_preference');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

  <!-- Header Control Bar -->
  <header class="bg-gray-800 border-b border-gray-700 h-16 flex items-center justify-between px-6">
    <div class="flex items-center gap-3">
      <a href="/meetings" class="text-gray-400 hover:text-white transition-colors">
        <i class="fas fa-arrow-left text-lg"></i>
      </a>
      <div>
        <h1 class="font-bold text-sm md:text-base flex items-center gap-1.5">
          <span class="inline-block w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
          Live Consultation Room
        </h1>
        <p class="text-[11px] text-gray-400" id="roomNameSub">Connecting...</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2">
      <a href="/meetings" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-xl text-xs transition-colors shadow">
        Leave Consultation
      </a>
    </div>
  </header>

  <!-- Jitsi Frame Container -->
  <main class="flex-grow bg-gray-950 flex items-center justify-center relative">
    <div id="meet" class="w-full h-full absolute inset-0">
      <!-- Jitsi API iframe will occupy this space -->
    </div>
    
    <!-- Fallback if Jitsi fails to load -->
    <div id="loading" class="text-center z-10 flex flex-col items-center">
      <i class="fas fa-spinner fa-spin text-3xl text-naija-green mb-3"></i>
      <p class="text-sm font-semibold text-gray-300">Initializing Secure Video Server...</p>
    </div>
  </main>

  <script>
    // Verify session
    let email = localStorage.getItem('email') || '';
    if (!email) {
      try {
        const sessionStr = localStorage.getItem('user_session');
        if (sessionStr) {
          const session = JSON.parse(sessionStr);
          email = session.email;
        }
      } catch (e) {}
    }

    if (!email) {
      window.location.href = '/';
    }

    // Extract roomName from URL params
    const urlParams = new URLSearchParams(window.location.search);
    const roomName = urlParams.get('roomName') || 'presibo-default-consultation';

    document.getElementById('roomNameSub').textContent = `Room ID: ${roomName}`;

    // Initialize Jitsi Meet External API
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const domain = 'meet.jit.si';
        const options = {
          roomName: roomName,
          width: '100%',
          height: '100%',
          parentNode: document.querySelector('#meet'),
          configOverwrite: {
            startWithAudioMuted: false,
            startWithVideoMuted: false,
            prejoinPageEnabled: false
          },
          interfaceConfigOverwrite: {
            TOOLBAR_BUTTONS: [
              'microphone', 'camera', 'closedcaptions', 'desktop', 'embedmeeting', 'fullscreen',
              'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
              'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
              'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
              'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
              'security'
            ],
            SETTINGS_SECTIONS: [ 'devices', 'language', 'profile', 'calendar' ],
            SHOW_CHROME_EXTENSION_BANNER: false
          }
        };

        const api = new JitsiMeetExternalAPI(domain, options);

        api.addEventListener('videoConferenceJoined', () => {
          document.getElementById('loading').style.display = 'none';
        });

        api.addEventListener('readyToClose', () => {
          window.location.href = '/meetings';
        });
      } catch (e) {
        console.error('Jitsi loading error', e);
        document.getElementById('loading').innerHTML = `
          <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-2"></i>
          <p class="text-sm font-bold">Failed to load video conferencing.</p>
          <p class="text-xs text-gray-500 mt-1">Please check your internet connection and try again.</p>
        `;
      }
    });
  </script>
</body>
</html>
