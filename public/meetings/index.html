<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Consultations & Meetings - Presibo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'naija-green': '#008753',
            'trust-blue': '#3B82F6',
          }
        }
      }
    }
  </script>
  <script>
    (function() {
      const theme = localStorage.getItem('theme_preference');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    .menu-link { color: black; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .menu-link:hover { color: #008753; }
    .menu-link.active { background: #008753; color: white; }
    .text-purple { color: #300b5b; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 font-sans pt-20">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b fixed top-0 left-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-md">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
          <span class="font-bold text-purple">Presibo</span>
        </div>

        <nav class="hidden md:flex space-x-4">
          <a href="/dashboard" class="menu-link">Dashboard</a>
          <a href="/track" class="menu-link">Track</a>
          <a href="/fitness" class="menu-link">Fitness</a>
          <a href="/doctors" class="menu-link">Doctors</a>
          <a href="/trainers" class="menu-link">Trainers</a>
          <a href="/meetings" class="menu-link active">Meetings</a>
        </nav>

        <div class="relative">
          <button id="profile-btn" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full">
            <i class="fas fa-user-circle text-2xl"></i>
          </button>
          <div id="profile-dropdown" class="absolute top-12 right-0 bg-white border rounded-lg shadow-lg min-w-[200px] hidden">
            <a href="/settings" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
            <a href="/logout" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-4xl mx-auto p-6 space-y-6">
    <div class="bg-gradient-to-r from-naija-green to-trust-blue rounded-2xl p-6 text-white shadow">
      <h2 class="text-2xl font-bold">Consultation Log & Video Rooms</h2>
      <p class="text-sm opacity-90 mt-1">Review your scheduled bookings and join live Jitsi video meetings instantly.</p>
    </div>

    <!-- Meetings List Wrapper -->
    <div class="bg-white rounded-2xl shadow p-6 border border-gray-100">
      <h3 class="font-bold text-lg text-gray-800 mb-4 flex items-center gap-2">
        <i class="fas fa-calendar-check text-naija-green"></i> Scheduled Consultations
      </h3>
      <div id="meetingsList" class="space-y-4">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </main>

  <script>
    let email = localStorage.getItem('email') || '';
    if (!email) {
      try {
        const sessionStr = localStorage.getItem('user_session');
        if (sessionStr) {
          const session = JSON.parse(sessionStr);
          email = session.email;
        }
      } catch (e) {}
    }

    if (!email) {
      window.location.href = '/';
    }

    function loadMeetings() {
      const meetingsKey = `consultations_${email}`;
      let consultations = [];
      try {
        consultations = JSON.parse(localStorage.getItem(meetingsKey) || '[]');
      } catch(e) {}

      const container = document.getElementById('meetingsList');
      if (consultations.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 flex flex-col items-center">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3">
              <i class="fas fa-video-slash text-gray-400 text-2xl"></i>
            </div>
            <p class="font-semibold text-gray-700 text-sm">No scheduled consultations found</p>
            <p class="text-xs text-gray-500 mt-1 mb-4">Book a consultation session with our certified doctors or fitness trainers.</p>
            <div class="flex gap-3">
              <a href="/doctors" class="bg-naija-green text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-naija-green/90 transition-colors">
                Find Doctors
              </a>
              <a href="/trainers" class="bg-trust-blue text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-trust-blue/90 transition-colors">
                Find Trainers
              </a>
            </div>
          </div>
        `;
        return;
      }

      // Sort by date/time descending
      consultations.sort((a,b) => b.id - a.id);

      container.innerHTML = consultations.map(c => {
        // Extract room name from roomUrl or make one
        const urlObj = new URL(c.roomUrl);
        const pathSegments = urlObj.pathname.split('/');
        const roomName = pathSegments[pathSegments.length - 1];

        return `
          <div class="p-4 rounded-xl border border-gray-100 bg-gray-50 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div class="space-y-1">
              <div class="flex items-center gap-2">
                <span class="font-extrabold text-gray-800 text-sm">${c.doctorName}</span>
                <span class="text-[10px] bg-green-100 text-green-800 font-bold px-2 py-0.5 rounded">${c.specialty}</span>
              </div>
              <div class="text-xs text-gray-500 flex flex-wrap gap-x-4">
                <span><i class="fas fa-calendar mr-1"></i>${c.date}</span>
                <span><i class="fas fa-clock mr-1"></i>${c.time}</span>
              </div>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
              <a href="/video-room/index.html?roomName=${encodeURIComponent(roomName)}" class="bg-naija-green text-white hover:bg-naija-green/90 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-sm transition-colors">
                <i class="fas fa-video"></i> Join Room
              </a>
              <button onclick="cancelMeeting(${c.id})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Cancel booking">
                <i class="fas fa-trash-alt text-sm"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function cancelMeeting(meetingId) {
      if (!confirm("Are you sure you want to cancel this booking? Credits will be refunded.")) return;
      const meetingsKey = `consultations_${email}`;
      let consultations = JSON.parse(localStorage.getItem(meetingsKey) || '[]');
      const filtered = consultations.filter(c => c.id !== meetingId);
      localStorage.setItem(meetingsKey, JSON.stringify(filtered));

      // Refund 100 credits
      let currentBalance = parseInt(localStorage.getItem('cached_wallet_balance') || '0');
      currentBalance += 100;
      localStorage.setItem('cached_wallet_balance', currentBalance);

      loadMeetings();
    }

    // Dropdowns
    const profileBtn = document.getElementById('profile-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    profileBtn.addEventListener('click', () => profileDropdown.classList.toggle('hidden'));

    document.addEventListener('click', (e) => {
      if (!profileBtn.contains(e.target)) profileDropdown.classList.add('hidden');
    });

    loadMeetings();
  </script>
</body>
</html>
