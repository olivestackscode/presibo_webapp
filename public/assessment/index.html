<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presibo Personal Health Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="/assets/js/config.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #e0f2ff, #f8fbff);
      min-height: 100vh;
    }
    .gradient-text {
      background: linear-gradient(to right, #007bff, #00b4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center px-4 py-8">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-2xl">
    <h1 class="text-3xl font-bold gradient-text text-center mb-4">
      Presibo Personal Health Assessment
    </h1>
    <p class="text-center text-gray-600 mb-6">
      Powered by <span class="font-semibold text-blue-600">Presibo AI</span>
    </p>

    <!-- Assessment Form -->
    <div class="space-y-4">
      <input id="first_name" type="text" placeholder="Your Name" class="w-full border rounded-lg p-3" />
      <input id="email" type="email" placeholder="Your Email" class="w-full border rounded-lg p-3" />
      <textarea id="symptoms" placeholder="Describe your symptoms or health concern..." rows="4" class="w-full border rounded-lg p-3"></textarea>

      <button id="analyzeBtn" class="bg-blue-600 text-white w-full rounded-lg py-3 font-semibold hover:bg-blue-700">
        Analyze with Presibo AI
      </button>
    </div>

    <!-- AI Result -->
    <div id="result" class="hidden mt-6 bg-blue-50 border border-blue-100 rounded-lg p-4 text-gray-800">
      <h2 class="font-semibold text-lg text-blue-700 mb-2">AI Assessment Result</h2>
      <p id="resultText" class="text-sm leading-relaxed whitespace-pre-line"></p>

      <!-- Share Buttons -->
      <div class="flex flex-wrap justify-between gap-2 mt-4">
        <button id="saveBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
          💾 Save
        </button>
        <button id="emailBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
          📧 Share via Email
        </button>
        <button id="whatsappBtn" class="bg-[#25D366] text-white px-4 py-2 rounded-lg hover:bg-[#20b358]">
          💬 WhatsApp
        </button>
      </div>
    </div>
  </div>

  <script>
    // Check if user is logged in
    function isLoggedIn() {
      return !!sessionStorage.getItem('email') || localStorage.getItem('isLoggedIn') === 'true';
    }

    // Show login prompt if not logged in
    function showLoginPrompt() {
      if (!isLoggedIn()) {
        const loginPrompt = document.createElement('div');
        loginPrompt.className = 'mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-center';
        loginPrompt.innerHTML = `
          <div class="text-sm text-yellow-800 mb-2">⚠️ Warning: You are not logged in. Please log in to continue using AI services.</div>
          <button id="loginToContinueBtn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
            Login to Continue
          </button>
        `;
        
        const formDiv = document.querySelector('.space-y-4');
        formDiv.parentNode.insertBefore(loginPrompt, formDiv.nextSibling);
        
        document.getElementById('loginToContinueBtn').addEventListener('click', () => {
          window.location.href = '/login';
        });
      }
    }

    // Check authentication on page load
    window.addEventListener('load', () => {
      showLoginPrompt();
    });

    // Configuration
    const userEmail = sessionStorage.getItem('email');
    let freeLimit = 2; // 2 free assessments
    let remaining = freeLimit;
    let isSubscribed = false;

    // DOM Elements
    const analyzeBtn = document.getElementById("analyzeBtn");
    const saveBtn = document.getElementById("saveBtn");
    const emailBtn = document.getElementById("emailBtn");
    const whatsappBtn = document.getElementById("whatsappBtn");
    const resultDiv = document.getElementById("result");
    const resultText = document.getElementById("resultText");
    
    // Update usage display
    function updateUsageDisplay() {
      const usageDiv = document.querySelector('.space-y-4');
      let usageDisplay = document.getElementById('usageDisplay');
      
      if (!usageDisplay) {
        usageDisplay = document.createElement('div');
        usageDisplay.id = 'usageDisplay';
        usageDisplay.className = 'mt-2 text-center text-sm text-blue-600 font-medium';
        usageDiv.parentNode.insertBefore(usageDisplay, usageDiv);
      }
      
      usageDisplay.textContent = `Free Assessments Remaining: ${remaining} of ${freeLimit}`;
    }
    
    // Show payment modal
    function showPaymentModal() {
      const modal = document.createElement('div');
      modal.className = 'dialog-overlay active';
      modal.style.position = 'fixed';
      modal.style.top = '0';
      modal.style.left = '0';
      modal.style.right = '0';
      modal.style.bottom = '0';
      modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
      modal.style.display = 'flex';
      modal.style.alignItems = 'center';
      modal.style.justifyContent = 'center';
      modal.style.zIndex = '1000';
      
      modal.innerHTML = `
        <div class="dialog-content bg-white rounded-lg max-w-md w-full p-6" style="background:white;border-radius:.5rem;max-width:28rem;width:100%;padding:1.5rem;">
          <div class="flex items-center gap-2 mb-4">
            <h2 class="text-lg font-semibold">AI Assessment Payment</h2>
          </div>
          <div class="space-y-4">
            <div class="text-center">
              <div class="text-3xl font-bold text-green-600 mb-2">₦1,000</div>
              <div class="text-sm text-gray-600">one-time payment</div>
            </div>
            <div class="space-y-2">
              <button id="subscribeNow" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">Subscribe for ₦1,000</button>
              <button id="closeModal" class="w-full border border-gray-200 py-2 rounded-lg hover:bg-gray-50">Maybe Later</button>
            </div>
            <div class="text-xs text-gray-500 text-center">Secure payment powered by Paystack.</div>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      
      // Handle subscription
      document.getElementById('subscribeNow').addEventListener('click', handleSubscribeClick);
      
      // Close modal
      document.getElementById('closeModal').addEventListener('click', () => {
        document.body.removeChild(modal);
      });
    }
    
    // Handle subscription click
    function handleSubscribeClick() {
      // Get user email from session/local storage
      const email = userEmail || localStorage.getItem('userEmail') || prompt('Please enter your email for the transaction:');
      
      if (!email) {
        alert('Email is required for payment processing');
        return;
      }
      
      // Initialize Paystack
      const handler = PaystackPop.setup({
        key: CONFIG.PAYSTACK_PUBLIC_KEY || 'pk_live_e4512c48de3fef4f92b4b278715d5decfa436d5b', // Replace with actual Paystack public key
        email: email,
        amount: 100000, // 1000 naira in kobo
        currency: 'NGN',
        ref: ''+Math.floor((Math.random() * 1000000000) + 1), // Generate transaction reference
        callback: function(response) {
          // Payment complete! Implement success response here
          alert('Payment successful! Transaction reference: ' + response.reference);
          
          // Remove modal
          const modal = document.querySelector('.dialog-overlay');
          if (modal) document.body.removeChild(modal);
          
          // Mark as subscribed and reset usage
          isSubscribed = true;
          remaining = freeLimit; // Reset to full free limit for subscribed users
          updateUsageDisplay();
          
          // Add success message
          alert('Thank you for subscribing! You now have unlimited access to health assessments.', false);
        },
        onClose: function() {
          alert('Transaction was not completed, window closed.');
          // Remove modal
          const modal = document.querySelector('.dialog-overlay');
          if (modal) document.body.removeChild(modal);
        }
      });
      
      handler.openIframe();
    }
    
    updateUsageDisplay();

    async function analyzeHealth() {
      const name = document.getElementById("first_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const symptoms = document.getElementById("symptoms").value.trim();

      // Check if user is logged in
      if (!isLoggedIn()) {
        showLoginPrompt();
        return;
      }

      if (!symptoms) {
        alert("Please describe your symptoms.");
        return;
      }

      // Check if user has exceeded free limit
      if (!isSubscribed && remaining <= 0) {
        showPaymentModal();
        return;
      }

      analyzeBtn.textContent = "Analyzing...";
      analyzeBtn.disabled = true;

      // Decrease remaining count if not subscribed
      if (!isSubscribed) {
        remaining--;
        updateUsageDisplay();
        
        // Check if this was the last free assessment
        if (remaining <= 0) {
          setTimeout(() => {
            showPaymentModal();
          }, 1000);
        }
      }

      const payload = {
        message: `Analyze this user's symptoms and provide a helpful health insight:\n${symptoms}`,
        name: name || "User",
        email: email || "guest@presibo.com",
        temperature: 0.7,
        max_tokens: 400
      };

      console.log("📤 Sending payload to AI API:", payload);

      try {
        const res = await fetch(CONFIG.API_AI_URL || "https://api.presibo.com/ai/open.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        console.log("✅ Raw API Response Object:", res);

        const data = await res.json();
        console.log("✅ Parsed API Response JSON:", data);

        if (data.status === "success" && data.reply) {
          console.log("🧠 AI Message Received:", data.reply);
          resultText.textContent = data.reply;
          resultDiv.classList.remove("hidden");
        } else {
          console.warn("⚠️ AI did not return any analysis. Response was:", data);
          resultText.textContent = "⚠️ AI did not return any analysis. Please try again later.";
          resultDiv.classList.remove("hidden");
        }
      } catch (error) {
        console.error("❌ API call failed:", error);
        resultText.textContent = "❌ An error occurred while connecting to the AI.";
        resultDiv.classList.remove("hidden");
      }

      analyzeBtn.textContent = "Analyze with Presibo AI";
      analyzeBtn.disabled = false;
    }

    // Save result locally
    function saveResult() {
      const content = resultText.textContent;
      const blob = new Blob([content], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "Presibo_Health_Assessment.txt";
      a.click();
      console.log("💾 Result saved locally.");
    }

    // Share by email through Presibo API
    async function shareByEmail() {
      const email = document.getElementById("email").value.trim();
      const first_name = document.getElementById("first_name").value.trim() || "User";
      const subject = "Your Presibo AI Health Assessment Result";
      const message = resultText.textContent;

      if (!email) {
        alert("Please enter your email address.");
        return;
      }

      console.log("📧 Sending email via Presibo API:", { email, first_name, subject, message });

      try {
        const response = await fetch(CONFIG.API_EMAIL_URL || "https://api.presibo.com/email/index.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "send",
            type: "custom",
            email: email,
            name: first_name,
            title: subject,
            message: message,
          }),
        });

        const result = await response.json();
        console.log("✅ Email API Response:", result);

        alert(result.status === "success" ? "Email sent successfully!" : "Failed to send email.");
      } catch (error) {
        console.error("🚨 Email sending error:", error);
        alert("Error sending email. Check console for details.");
      }
    }

    // Share to WhatsApp
    function shareToWhatsApp() {
      const text = encodeURIComponent(
        `🩺 Presibo AI Health Assessment Result:

${resultText.textContent}

Get yours at presibo.com`
      );
      const url = `https://wa.me/?text=${text}`;
      console.log("📱 Opening WhatsApp share:", url);
      window.open(url, "_blank");
    }

    analyzeBtn.addEventListener("click", analyzeHealth);
    saveBtn.addEventListener("click", saveResult);
    emailBtn.addEventListener("click", shareByEmail);
    whatsappBtn.addEventListener("click", shareToWhatsApp);
  </script>
</body>
</html>
