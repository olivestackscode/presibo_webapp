<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presibo – AI Personal Health Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; background: #f8fafc; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 2rem; }
    #aiResult { transition: all 0.3s ease-in-out; white-space: pre-wrap; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-2xl mx-auto card">
    <h1 class="text-2xl font-bold text-center text-blue-700 mb-4">🩺 Presibo AI Personal Health Assessment</h1>
    
    <textarea id="symptoms" placeholder="Describe how you feel..." class="w-full border rounded-lg p-3 mb-4" rows="4"></textarea>
    <button id="analyzeBtn" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Analyze</button>

    <div class="mt-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-2">AI Assessment Result</h2>
      <div id="aiResult" class="p-4 bg-gray-50 rounded-lg text-gray-700">
        Your AI result will appear here.
      </div>
    </div>
  </div>

  <script>
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const symptoms = document.getElementById('symptoms').value.trim();
      const aiResultDiv = document.getElementById('aiResult');

      if (!symptoms) {
        alert("Please describe your symptoms before analyzing.");
        return;
      }

      aiResultDiv.textContent = "⏳ Analyzing your health input... please wait.";

      const payload = {
        prompt: `Analyze this user's symptoms and provide a health insight:\n${symptoms}`,
        temperature: 0.7,
        max_tokens: 400
      };

      console.log("📤 Sending payload:", payload);

      try {
        const res = await fetch('https://api.presibo.com/ai/open.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        console.log("✅ Raw API Response Object:", res);

        if (!res.ok) {
          console.error("❌ API HTTP error:", res.status, res.statusText);
          aiResultDiv.textContent = "⚠️ Unable to get AI response. Please try again later.";
          return;
        }

        const data = await res.json();
        console.log("✅ Parsed API Response JSON:", data);

        // Expected AI message or fallback
        const aiMessage = data.message || data.result || JSON.stringify(data);
        console.log("🧠 AI message:", aiMessage);

        aiResultDiv.innerHTML = aiMessage.replace(/\n/g, '<br>');
      } catch (error) {
        console.error("❌ Fetch or parsing error:", error);
        aiResultDiv.textContent = "⚠️ Network error or invalid response. Check console for details.";
      }
    });
  </script>
</body>
</html>
