<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Home Doctor Visit - Presibo</title>
<meta name="description" content="Schedule a home visit from our doctors within 3 hours. Select a doctor, choose a time, and provide your address. Call 0916 762 9900 for urgent visits.">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
.input { width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
.dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.dialog-overlay.active { display: flex; }
.dialog-content { background: white; border-radius: 0.5rem; max-width: 28rem; width: 100%; padding: 1.5rem; }
.bg-purple-600 {background: linear-gradient(135deg, #8b5cf6, #7c3aed);}
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 font-sans">

<header class="bg-white shadow-sm border-b">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
    <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
    <span class="font-bold text-purple">Presibo</span>
  </div>
</header>

<main class="max-w-5xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-2">Schedule a Home Visit from Our Doctors</h1>
  <p class="mb-4 text-gray-700">Select a doctor below to schedule a home visit within 3 hours. <strong>Call: <span class="font-bold">0916 762 9900</span></strong> for urgent requests.</p>

  <div id="doctorsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <div id="confirmation" class="hidden mt-6 p-4 bg-green-100 rounded-lg text-green-800">
    ✅ Your home visit is scheduled! Doctor will arrive in <span id="countdown">03:00:00</span>.
  </div>
</main>

<!-- Booking Modal -->
<div id="booking-modal" class="dialog-overlay">
  <div class="dialog-content bg-white p-6 rounded-xl shadow-xl max-w-md mx-auto">
    <h2 class="text-lg font-semibold mb-4">Schedule Home Visit</h2>
    <div id="booking-modal-content" class="text-sm text-gray-700 mb-4"></div>
    <div class="flex gap-2">
      <button id="booking-modal-action" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex-grow">Pay & Submit</button>
      <button class="modal-close border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 flex-grow">Close</button>
    </div>
  </div>
</div>

<script>
let doctors = [];
let isSubscribed = false;

// Fetch doctors and render cards
async function fetchDoctors() {
  try {
    const res = await fetch('https://presibo-wl.vercel.app/doctors.json');
    const data = await res.json();
    doctors = data.users.map(d => ({
      id: d.id,
      name: d.fullname || `Dr. ${d.firstname} ${d.lastname}`,
      specialization: d.specialization || 'General Practitioner',
      location: `${d.location}, ${d.country}` || 'N/A',
      experience: d.years || 'N/A',
      thumbnail: d.thumbnail || '/assets/img/doctor-default.png'
    }));
    renderDoctors(doctors);
  } catch(err) {
    document.getElementById('doctorsList').innerHTML = `<div class="text-center text-red-500 py-8">Failed to load doctors.</div>`;
  }
}

// Render doctor cards
function renderDoctors(list) {
  const container = document.getElementById('doctorsList');
  container.innerHTML = list.map(d => `
    <div class="bg-white rounded-xl p-4 shadow hover:shadow-lg transition">
      <img src="https://presibo-wl.vercel.app/photos/${d.thumbnail}.jpg" class="w-16 h-16 rounded-full mb-2 object-cover" alt="${d.name}">
      <h3 class="font-semibold text-lg">${d.name}</h3>
      <p class="text-sm text-gray-600 mb-1">${d.specialization}</p>
      <p class="text-sm text-gray-600 mb-1">${d.location}</p>
      <p class="text-sm text-gray-600 mb-2">${d.experience} years experience</p>
      <button onclick="openBookingModal('${d.id}')" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 w-full">Schedule Home Visit</button>
    </div>
  `).join('');
}

// Open modal to schedule home visit
function openBookingModal(doctorId) {
  const doctor = doctors.find(d => d.id == doctorId);
  const modal = document.getElementById('booking-modal');
  const modalContent = document.getElementById('booking-modal-content');

  modalContent.innerHTML = `
    <p><strong>Doctor:</strong> ${doctor.name}</p>
    <p><strong>Specialization:</strong> ${doctor.specialization}</p>
    <label class="block mt-2">
      <span>Email</span>
      <input type="email" id="user-email" class="input" placeholder="you@example.com" required />
    </label>
    <label class="block mt-2">
      <span>Date:</span>
      <input type="date" id="visit-date" class="input" required />
    </label>
    <label class="block mt-2">
      <span>Time:</span>
      <input type="time" id="visit-time" class="input" required />
    </label>
    <label class="block mt-2">
      <span>Home Address:</span>
      <input type="text" id="home-address" class="input" placeholder="Enter your full address" required />
    </label>
  `;

  modal.classList.add('active');

  document.getElementById('booking-modal-action').onclick = async () => {
    const email = document.getElementById('user-email').value.trim();
    const date = document.getElementById('visit-date').value;
    const time = document.getElementById('visit-time').value;
    const address = document.getElementById('home-address').value.trim();

    if (!email || !date || !time || !address) return;

    // Paystack payment integration
    const handler = PaystackPop.setup({
      key: 'pk_live_e4512c48de3fef4f92b4b278715d5decfa436d5b',
      email,
      amount: 2500000, // ₦25,000
      currency: "NGN",
      onSuccess: async function(ref) {
        isSubscribed = true;
        try {
          const res = await fetch('https://api.presibo.com/appointments/new.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              doctor_id: doctor.id,
              doctor: doctor.name,
              specialty: doctor.specialization,
              date, time, address,
              type: "home_visit",
              payment_ref: ref.reference
            })
          });
          const result = await res.json();
          if(result.status === 'success'){
            modal.classList.remove('active');
            document.getElementById('confirmation').classList.remove('hidden');
            startCountdown(3*60*60); // 3 hours
          }
        } catch(err) {
          console.error(err);
        }
      },
      onCancel: function() { /* payment cancelled */ }
    });
    handler.openIframe();
  }
}

// Close modal
document.querySelectorAll('.modal-close').forEach(btn => btn.addEventListener('click', () => {
  document.getElementById('booking-modal').classList.remove('active');
}));

// Countdown timer
function startCountdown(seconds) {
  const countdownEl = document.getElementById('countdown');
  let remaining = seconds;
  const interval = setInterval(() => {
    const h = String(Math.floor(remaining/3600)).padStart(2,'0');
    const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
    const s = String(remaining%60).padStart(2,'0');
    countdownEl.textContent = `${h}:${m}:${s}`;
    remaining--;
    if(remaining<0) clearInterval(interval);
  },1000);
}

fetchDoctors();
</script>
</body>
</html>
