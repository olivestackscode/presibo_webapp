<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Doctor Visit - Presibo Home Visits</title>
<meta name="description" content="Schedule a doctor visit within 3 hours. Choose a doctor from our dropdown, pick your preferred time, and provide your address. Call <strong>0916 762 9900</strong> for urgent visits.">
<meta name="keywords" content="Doctor Visit, Home Visit, Presibo, Schedule Appointment, Nigeria, Healthcare, 3 Hour Visit">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { 'naija-green': '#008753', 'trust-blue': '#3B82F6' } } }
};
</script>
<style>
.input { width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
.dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.dialog-overlay.active { display: flex; }
.dialog-content { background: white; border-radius: 0.5rem; max-width: 28rem; width: 100%; padding: 1.5rem; }
.bg-purple-600 {background: linear-gradient(135deg, #8b5cf6, #7c3aed);}
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 font-sans">

<header class="bg-white shadow-sm border-b">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
<img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="w-8 h-8">
<span class="font-bold text-purple">Presibo</span>
</div>
</header>

<main class="max-w-3xl mx-auto p-6">
<h1 class="text-2xl font-bold mb-2">Schedule a Doctor Visit within 3 Hours</h1>
<p class="mb-4 text-gray-700">Select a doctor from the dropdown, choose a preferred time, provide your home address, and submit. <strong>Call: 0916 762 9900</strong> for urgent visits.</p>

<form id="homeVisitForm" class="space-y-4 bg-white p-6 rounded-xl shadow">
  <label class="block">
    <span class="text-gray-700">Select Doctor:</span>
    <select id="doctorSelect" class="input">
      <option value="">Loading doctors...</option>
    </select>
  </label>

  <label class="block">
    <span class="text-gray-700">Date:</span>
    <input type="date" id="visit-date" class="input" required />
  </label>

  <label class="block">
    <span class="text-gray-700">Time:</span>
    <input type="time" id="visit-time" class="input" required />
  </label>

  <label class="block">
    <span class="text-gray-700">Home Address:</span>
    <input type="text" id="home-address" placeholder="Enter your full address" class="input" required />
  </label>

  <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 w-full">Schedule Home Visit</button>
</form>

<div id="confirmation" class="hidden mt-6 p-4 bg-green-100 rounded-lg text-green-800">
  ✅ Your home visit is scheduled! Doctor will arrive in <span id="countdown">03:00:00</span>.
</div>

<div id="doctorInfo" class="hidden mt-4 p-4 bg-blue-50 rounded-lg text-gray-700">
  <h2 class="font-semibold text-lg mb-2">Doctor Details</h2>
  <p id="docName"></p>
  <p id="docSpec"></p>
  <p id="docLoc"></p>
  <p id="docExp"></p>
</div>

</main>

<script>
let doctors = [];

// Fetch doctors and populate dropdown
async function fetchDoctors() {
  try {
    const res = await fetch('https://presibo-wl.vercel.app/doctors.json');
    const data = await res.json();
    doctors = data.users.map(d => ({
      id: d.id,
      name: d.fullname || `Dr. ${d.firstname} ${d.lastname}`,
      specialization: d.specialization || 'General Practitioner',
      location: `${d.location}, ${d.country}` || 'N/A',
      experience: d.years || 'N/A'
    }));

    const select = document.getElementById('doctorSelect');
    select.innerHTML = '<option value="">Select a doctor</option>';
    doctors.forEach(d => {
      const option = document.createElement('option');
      option.value = d.id;
      option.textContent = `${d.name} (${d.specialization})`;
      select.appendChild(option);
    });
  } catch (err) {
    console.error('Failed to fetch doctors', err);
  }
}

// Show doctor details when selected
document.getElementById('doctorSelect').addEventListener('change', e => {
  const doctor = doctors.find(d => d.id == e.target.value);
  const info = document.getElementById('doctorInfo');
  if (doctor) {
    document.getElementById('docName').textContent = `Name: ${doctor.name}`;
    document.getElementById('docSpec').textContent = `Specialization: ${doctor.specialization}`;
    document.getElementById('docLoc').textContent = `Location: ${doctor.location}`;
    document.getElementById('docExp').textContent = `Experience: ${doctor.experience} years`;
    info.classList.remove('hidden');
  } else {
    info.classList.add('hidden');
  }
});

// Handle form submission
document.getElementById('homeVisitForm').addEventListener('submit', async e => {
  e.preventDefault();
  const doctorId = document.getElementById('doctorSelect').value;
  const date = document.getElementById('visit-date').value;
  const time = document.getElementById('visit-time').value;
  const address = document.getElementById('home-address').value.trim();

  if (!doctorId || !date || !time || !address) return alert('Please fill in all fields.');

  const doctor = doctors.find(d => d.id == doctorId);

  try {
    const response = await fetch('https://api.presibo.com/appointments/new.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        doctor_id: doctor.id,
        doctor: doctor.name,
        specialty: doctor.specialization,
        date,
        time,
        address,
        type: "home_visit"
      })
    });
    const result = await response.json();
    if (result.status === 'success') {
      document.getElementById('confirmation').classList.remove('hidden');
      startCountdown(3*60*60); // 3 hours in seconds
    } else throw new Error(result.message);
  } catch (err) {
    console.error(err);
    alert('Failed to schedule home visit. Try again.');
  }
});

// Countdown timer
function startCountdown(seconds) {
  const countdownEl = document.getElementById('countdown');
  let remaining = seconds;
  const interval = setInterval(() => {
    const h = String(Math.floor(remaining / 3600)).padStart(2,'0');
    const m = String(Math.floor((remaining % 3600)/60)).padStart(2,'0');
    const s = String(remaining % 60).padStart(2,'0');
    countdownEl.textContent = `${h}:${m}:${s}`;
    remaining--;
    if (remaining < 0) clearInterval(interval);
  }, 1000);
}

fetchDoctors();
</script>

</body>
</html>
