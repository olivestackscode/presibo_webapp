<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Presibo Health</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      width: 70px;
      margin-bottom: 15px;
    }
    h2 {
      color: #1f7a3b;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #1f7a3b;
      box-shadow: 0 0 0 2px rgba(31,122,59,0.1);
    }
    button {
      width: 100%;
      margin-top: 15px;
      background-color: #244fb8;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    button:hover {
      background-color: #244fb6;
    }
    #result {
      margin-top: 15px;
      font-weight: 500;
      font-size: 15px;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
    .hidden {
      display: none;
    }
    .link-btn {
      background: none;
      border: none;
      color: #1f7a3b;
      text-decoration: underline;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container" id="resetContainer">
    <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="logo">
    <h2>Reset Your Password</h2>
    <p>Enter your new password below.</p>

    <form id="resetForm">
      <input type="password" id="password" placeholder="New password" required minlength="6" />
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6" />
      <button type="submit">Update Password</button>
    </form>

    <div id="result"></div>

    <button class="link-btn hidden" id="backToLogin" onclick="window.location.href='login.html'">Back to Sign In</button>
  </div>

  <script>
    const form = document.getElementById("resetForm");
    const resultDiv = document.getElementById("result");
    const backBtn = document.getElementById("backToLogin");
    const container = document.getElementById("resetContainer");

    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    if (!token) {
      container.innerHTML = `
        <img src="/assets/img/new_presibo_icon.png" alt="Presibo Logo" class="logo">
        <h2 style="color:red;">Invalid Reset Link</h2>
        <p>This password reset link is invalid or has expired.</p>
        <button onclick="window.location.href='forgot-password'">Request New Reset Link</button>
      `;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      resultDiv.className = "";
      resultDiv.textContent = "";

      if (password.length < 6) {
        resultDiv.textContent = "Password must be at least 6 characters long.";
        resultDiv.className = "error";
        return;
      }

      if (password !== confirmPassword) {
        resultDiv.textContent = "Passwords do not match.";
        resultDiv.className = "error";
        return;
      }

      resultDiv.textContent = "Updating password...";
      resultDiv.className = "";

      try {
        const res = await fetch("https://api.presibo.com/users/index.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "reset_password",
            token,
            newPassword: password
          }),
        });

        const data = await res.json();
        console.log(data);

        if (data.success) {
          resultDiv.textContent = "✅ Password reset successful! You can now sign in.";
          resultDiv.className = "success";
          form.classList.add("hidden");
          backBtn.classList.remove("hidden");
        } else {
          resultDiv.textContent = "❌ " + (data.message || "Failed to reset password.");
          resultDiv.className = "error";
        }
      } catch (err) {
        console.error(err);
        resultDiv.textContent = "⚠️ Network error: " + err.message;
        resultDiv.className = "error";
      }
    });
  </script>

</body>
</html>
